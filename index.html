function findExId(exercises, name) {
  const found = exercises.find((e) => e.name === name);
  return found ? found.id : exercises[0]?.id || "";
}

function blankRow(exercises) {
  return { exerciseId: exercises[0]?.id || "", mode: "plain", sets: 3, repRange: "8-10", targetRpe: "", targetWeight: "", tmLift: "squat" };
}

function quickStart531(exercises, tms) {
  const templates = TM_LIFTS.map((lift) => ({
    id: uid(),
    name: `${lift.label} day`,
    exercises: [
      { exerciseId: findExId(exercises, lift.defaultName), mode: "531", tmLift: lift.key, sets: 3, repRange: "", targetRpe: "", targetWeight: "" },
    ],
  }));
  return { id: uid(), name: "5/3/1 Cycle", phase: "Intensity", weeks: 4, program: "531", startDate: todayISO(), trainingMaxes: tms, templates };
}

function round(n, d = 1) {
  const f = Math.pow(10, d);
  return Math.round((n + Number.EPSILON) * f) / f;
}

function est1RM(weight, reps) {
  if (!weight || !reps) return 0;
  if (reps === 1) return weight;
  return weight * (1 + reps / 30);
}

function todayISO() { return new Date().toISOString().slice(0, 10); }
function fmtDate(iso) {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function isoFromYMD(y, m, d) {
  return `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
}
function daysBetween(aISO, bISO) {
  const a = new Date(aISO + "T00:00:00");
  const b = new Date(bISO + "T00:00:00");
  return Math.round((b - a) / 86400000);
}

function cycleInfoForBlock(block, dateISO) {
  if (!block || !block.startDate) return { cycleWeek: 1, cycleNumber: 1 };
  const elapsedDays = daysBetween(block.startDate, dateISO || todayISO());
  const elapsedWeeks = Math.max(0, Math.floor(elapsedDays / 7));
  const cycleNumber = Math.floor(elapsedWeeks / 4) + 1;
  const cycleWeek = (elapsedWeeks % 4) + 1;
  return { cycleWeek, cycleNumber };
}

function resolve531Row(row, block, dateISO) {
  const { cycleWeek } = cycleInfoForBlock(block, dateISO);
  const weekDef = FIVE31_WEEKS[cycleWeek - 1];
  const tm = Number(block?.trainingMaxes?.[row.tmLift]) || 0;
  const sets = weekDef.pcts.map((pct, i) => ({ pct, reps: weekDef.reps[i], weight: tm ? round((pct / 100) * tm, 0) : null }));
  return { weekLabel: weekDef.label, cycleWeek, sets };
}

function lastSessionFor(logs, exerciseId, beforeDate) {
  const candidates = logs
    .filter((l) => (!beforeDate || l.date < beforeDate) && l.entries.some((e) => e.exerciseId === exerciseId))
    .sort((a, b) => (a.date < b.date ? 1 : -1));
  if (candidates.length === 0) return null;
  const log = candidates[0];
  const entry = log.entries.find((e) => e.exerciseId === exerciseId);
  return { date: log.date, sets: entry.sets };
}

function resolveOneRM(exo, estimated) {
  if (exo && exo.realOneRM != null && exo.realOneRM !== "" && !isNaN(Number(exo.realOneRM))) {
    return { value: Number(exo.realOneRM), isReal: true };
  }
  return { value: estimated, isReal: false };
}

function muscleRestHoursToNextDay(block, exercises, fromIndex) {
  const templates = block.templates;
  if (templates.length === 0) return {};
  const fromTemplate = templates[fromIndex];
  const fromMuscles = new Set();
  fromTemplate.exercises.forEach((te) => {
    const exo = exercises.find((e) => e.id === te.exerciseId);
    if (exo) fromMuscles.add(exo.muscle);
  });
  const result = {};
  fromMuscles.forEach((muscle) => {
    for (let step = 1; step <= templates.length; step++) {
      const idx = (fromIndex + step) % templates.length;
      const t = templates[idx];
      const hits = t.exercises.some((te) => {
        const exo = exercises.find((e) => e.id === te.exerciseId);
        return exo && exo.muscle === muscle;
      });
      if (hits) { result[muscle] = step * 24; return; }
    }
    result[muscle] = null;
  });
  return result;
}

const LB_PER_KG = 2.2046226218;
function lbToKg(lb) { return lb / LB_PER_KG; }
function kgToLb(kg) { return kg * LB_PER_KG; }

const RANK_TIERS = ["Beginner", "Novice", "Intermediate", "Advanced", "Elite"];
const RANK_TABLE_KG = {
  squat:    { M: [0.75, 1.25, 1.75, 2.25, 2.85], F: [0.50, 0.80, 1.25, 1.75, 2.25] },
  bench:    { M: [0.50, 0.90, 1.25, 1.75, 2.00], F: [0.30, 0.55, 0.75, 1.05, 1.35] },
  deadlift: { M: [1.00, 1.50, 2.00, 2.65, 3.25], F: [0.70, 1.00, 1.40, 1.90, 2.65] },
  ohp:      { M: [0.35, 0.55, 0.80, 1.05, 1.30], F: [0.20, 0.35, 0.50, 0.65, 0.85] },
};

function tierForRatio(lift, ratio, gender) {
  const table = RANK_TABLE_KG[lift]?.[gender === "F" ? "F" : "M"];
  if (!table) return null;
  let tierIdx = -1;
  for (let i = 0; i < table.length; i++) if (ratio >= table[i]) tierIdx = i;
  if (tierIdx === -1) return { tierIdx: -1, tierName: "Untiered", progressToNext: ratio / table[0], nextTierName: RANK_TIERS[0] };
  const isMax = tierIdx === table.length - 1;
  const progressToNext = isMax ? 1 : (ratio - table[tierIdx]) / (table[tierIdx + 1] - table[tierIdx]);
  return { tierIdx, tierName: RANK_TIERS[tierIdx], progressToNext: Math.min(1, Math.max(0, progressToNext)), nextTierName: isMax ? null : RANK_TIERS[tierIdx + 1] };
}

function normalizedScore(tierInfo) {
  if (!tierInfo) return 0;
  if (tierInfo.tierIdx === -1) return tierInfo.progressToNext * 20;
  return ((tierInfo.tierIdx + tierInfo.progressToNext) / RANK_TIERS.length) * 100;
}

const DOTS_COEFF = {
  M: { A: -0.0000010930, B: 0.0007391293, C: -0.1918759221, D: 24.0900756, E: -307.75076 },
  F: { A: -0.0000010706, B: 0.0005158568, C: -0.1126655495, D: 13.6175032, E: -57.96288 },
};
function calcDOTS(totalKg, bwKg, gender) {
  if (!totalKg || !bwKg) return null;
  const c = DOTS_COEFF[gender === "F" ? "F" : "M"];
  const denom = c.A * bwKg ** 4 + c.B * bwKg ** 3 + c.C * bwKg ** 2 + c.D * bwKg + c.E;
  if (!denom) return null;
  return round((totalKg * 500) / denom, 1);
}
const DOTS_TIERS = [
  { name: "Novice", min: 300 }, { name: "Intermediate", min: 400 }, { name: "Advanced", min: 450 }, { name: "Elite", min: 500 }, { name: "World Class", min: 600 },
];
function dotsTierFor(score) {
  if (score == null) return null;
  let tier = null;
  for (const t of DOTS_TIERS) if (score >= t.min) tier = t.name;
  return tier;
}

const storage = {
  get(key) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? { value: raw } : null;
    } catch (e) { return null; }
  },
  set(key, value) {
    try {
      localStorage.setItem(key, value);
      return { key, value };
    } catch (e) { return null; }
  },
};

function buildUserStats({ logs, exercises, bodyweightLogs, unit, gender }) {
  function bwAt(dateISO) {
    if (bodyweightLogs.length === 0) return null;
    const sorted = [...bodyweightLogs].sort((a, b) => Math.abs(daysBetween(a.date, dateISO)) - Math.abs(daysBetween(b.date, dateISO)));
    return sorted[0]?.weight ?? null;
  }
  function bwAtKg(dateISO) {
    const bw = bwAt(dateISO);
    return bw == null ? null : (unit === "kg" ? bw : lbToKg(bw));
  }

  const perExercisePRs = {};
  logs.forEach((log) => {
    log.entries.forEach((entry) => {
      let best = 0;
      entry.sets.forEach((s) => {
        const e1 = est1RM(s.weight, Math.min(s.reps, 10) || s.reps);
        if (e1 > best) best = e1;
      });
      if (!best) return;
      if (!perExercisePRs[entry.exerciseId]) perExercisePRs[entry.exerciseId] = { best: 0, history: [] };
      perExercisePRs[entry.exerciseId].history.push({ date: log.date, e1rm: round(best, 1) });
      if (best > perExercisePRs[entry.exerciseId].best) perExercisePRs[entry.exerciseId].best = round(best, 1);
    });
  });
  Object.values(perExercisePRs).forEach((p) => p.history.sort((a, b) => (a.date < b.date ? -1 : 1)));

  const mainLiftStats = {};
  TM_LIFTS.forEach((l) => {
    const exo = exercises.find((e) => e.isMain && (e.name === l.defaultName || e.name.toLowerCase().includes(l.label.toLowerCase())));
    if (!exo) { mainLiftStats[l.key] = null; return; }
    const pr = perExercisePRs[exo.id];
    const hasReal = exo.realOneRM != null && exo.realOneRM !== "" && !isNaN(Number(exo.realOneRM));
    if (!pr || pr.best === 0) {
      if (!hasReal) { mainLiftStats[l.key] = { exerciseId: exo.id, exerciseName: exo.name, e1rm: null }; return; }
    }
    const bestEntry = pr && pr.history.length ? [...pr.history].sort((a, b) => b.e1rm - a.e1rm)[0] : null;
    const resolved = resolveOneRM(exo, bestEntry ? bestEntry.e1rm : 0);
    const e1rmKg = unit === "kg" ? resolved.value : lbToKg(resolved.value);
    const refDate = hasReal ? todayISO() : (bestEntry ? bestEntry.date : todayISO());
    const bw = bwAtKg(refDate);
    mainLiftStats[l.key] = {
      exerciseId: exo.id, exerciseName: exo.name, e1rm: resolved.value, e1rmKg, isRealOneRM: resolved.isReal,
      bwAtPR: bw, ratio: bw ? e1rmKg / bw : null, prDate: refDate,
    };
  });

  let totalVolume = 0, totalReps = 0, sbdVolume = 0;
  const sbdNames = TM_LIFTS.filter((l) => l.key !== "ohp").map((l) => l.defaultName);
  logs.forEach((log) => {
    log.entries.forEach((entry) => {
      const exo = exercises.find((e) => e.id === entry.exerciseId);
      entry.sets.forEach((s) => {
        const vol = (s.weight || 0) * (s.reps || 0);
        totalVolume += vol;
        totalReps += s.reps || 0;
        if (exo && sbdNames.includes(exo.name)) sbdVolume += vol;
      });
    });
  });

  let dots = null, dotsTier = null;
  if (mainLiftStats.squat?.e1rmKg && mainLiftStats.bench?.e1rmKg && mainLiftStats.deadlift?.e1rmKg) {
    const totalKg = mainLiftStats.squat.e1rmKg + mainLiftStats.bench.e1rmKg + mainLiftStats.deadlift.e1rmKg;
    const refDate = [mainLiftStats.squat.prDate, mainLiftStats.bench.prDate, mainLiftStats.deadlift.prDate].sort().pop();
    const bwKg = bwAtKg(refDate);
    dots = bwKg ? calcDOTS(totalKg, bwKg, gender) : null;
    dotsTier = dots != null ? dotsTierFor(dots) : null;
  }

  const sortedLogDates = Array.from(new Set(logs.map((l) => l.date))).sort();
  const workoutCount = logs.length;
  function isoWeekKey(dateISO) {
    const d = new Date(dateISO + "T00:00:00");
    const onejan = new Date(d.getFullYear(), 0, 1);
    const wk = Math.ceil(((d - onejan) / 86400000 + onejan.getDay() + 1) / 7);
    return `${d.getFullYear()}-W${String(wk).padStart(2, "0")}`;
  }
  const weeksWithSessions = Array.from(new Set(sortedLogDates.map(isoWeekKey))).sort();
  let longestStreak = 0, curStreak = 0, prevWeekIdx = null;
  weeksWithSessions.forEach((wk) => {
    curStreak = prevWeekIdx === null ? 1 : curStreak + 1;
    longestStreak = Math.max(longestStreak, curStreak);
    prevWeekIdx = wk;
  });
  const currentStreak = weeksWithSessions.length;

  const exercisesEverLogged = new Set();
  logs.forEach((l) => l.entries.forEach((e) => exercisesEverLogged.add(e.exerciseId)));

  let recentPRCount = 0;
  const cutoff = todayISO();
  Object.entries(perExercisePRs).forEach(([, data]) => {
    let runningBest = 0;
    data.history.forEach((h) => {
      if (h.e1rm > runningBest) {
        runningBest = h.e1rm;
        if (daysBetween(h.date, cutoff) <= 30) recentPRCount++;
      }
    });
  });

  return { perExercisePRs, mainLiftStats, totalVolume: round(totalVolume), totalReps, sbdVolume: round(sbdVolume), dots, dotsTier, workoutCount, currentStreak, longestStreak, exercisesEverLogged, recentPRCount, bwAt, bwAtKg };
}

const BW_MULTIPLES = [0.5, 1, 1.5, 2, 2.5, 3];
const PLATE_MILESTONES_LB = [135, 225, 315, 405];
const VOLUME_TIERS_KG = [100000, 500000, 1000000, 5000000];

function buildAchievements(unit) {
  const achievements = [];

  TM_LIFTS.forEach((lift) => {
    BW_MULTIPLES.forEach((mult) => {
      achievements.push({
        id: `bwmult_${lift.key}_${mult}`, name: `${mult}x Bodyweight ${lift.label}`, description: `Hit a ${lift.label} e1RM of ${mult}x your bodyweight.`,
        category: "PR Milestones", icon: "barbell", tier: mult >= 2.5 ? "gold" : mult >= 1.5 ? "silver" : "bronze",
        check: (stats) => {
          const ls = stats.mainLiftStats[lift.key];
          if (!ls || !ls.ratio) return { earned: false, progress: 0, label: "Not enough data" };
          const earned = ls.ratio >= mult;
          return { earned, progress: Math.min(1, ls.ratio / mult), label: `${round(ls.ratio, 2)}x / ${mult}x bodyweight` };
        },
      });
    });
  });

  TM_LIFTS.forEach((lift) => {
    PLATE_MILESTONES_LB.forEach((lbVal) => {
      const displayVal = unit === "kg" ? round(lbToKg(lbVal)) : lbVal;
      achievements.push({
        id: `plate_${lift.key}_${lbVal}`, name: `${displayVal}${unit} ${lift.label}`, description: `Hit a ${displayVal}${unit} e1RM on ${lift.label}.`,
        category: "PR Milestones", icon: "barbell", tier: lbVal >= 315 ? "gold" : lbVal >= 225 ? "silver" : "bronze",
        check: (stats) => {
          const ls = stats.mainLiftStats[lift.key];
          if (!ls || ls.e1rm == null) return { earned: false, progress: 0, label: "Not enough data" };
          const earned = ls.e1rm >= displayVal;
          return { earned, progress: Math.min(1, ls.e1rm / displayVal), label: `${round(ls.e1rm)} / ${displayVal} ${unit}` };
        },
      });
    });
  });

  achievements.push({
    id: "first_exercise", name: "First Steps", description: "Log any exercise for the first time.", category: "PR Milestones", icon: "barbell", tier: "bronze",
    check: (stats) => ({ earned: stats.exercisesEverLogged.size > 0, progress: stats.exercisesEverLogged.size > 0 ? 1 : 0, label: stats.exercisesEverLogged.size > 0 ? "Earned" : "Log any exercise" }),
  });

  VOLUME_TIERS_KG.forEach((kgVal, i) => {
    const displayVal = unit === "kg" ? kgVal : round(kgToLb(kgVal));

      id: `volume_${kgVal}`, name: `${displayVal.toLocaleString()} ${unit} Moved`, description: `Move a lifetime total of ${displayVal.toLocaleString()} ${unit} across all logged sets.`,
      category: "Volume", icon: "plates", tier: i >= 2 ? "gold" : i >= 1 ? "silver" : "bronze",
      check: (stats) => {
        const earned = stats.totalVolume >= displayVal;
        return { earned, progress: Math.min(1, stats.totalVolume / displayVal), label: `${Math.round(stats.totalVolume).toLocaleString()} / ${displayVal.toLocaleString()} ${unit}` };
      },
    });
  });

  [50000, 250000, 500000].forEach((kgVal, i) => {
    const displayVal = unit === "kg" ? kgVal : round(kgToLb(kgVal));
    achievements.push({
      id: `sbdvolume_${kgVal}`, name: `${displayVal.toLocaleString()} ${unit} SBD Tonnage`, description: `Move ${displayVal.toLocaleString()} ${unit} combined across squat, bench, and deadlift.`,
      category: "Volume", icon: "plates", tier: i >= 2 ? "gold" : i >= 1 ? "silver" : "bronze",
      check: (stats) => {
        const earned = stats.sbdVolume >= displayVal;
        return { earned, progress: Math.min(1, stats.sbdVolume / displayVal), label: `${Math.round(stats.sbdVolume).toLocaleString()} / ${displayVal.toLocaleString()} ${unit}` };
      },
    });
  });

  [1000, 5000, 10000, 25000].forEach((repVal, i) => {
    achievements.push({
      id: `reps_${repVal}`, name: `${repVal.toLocaleString()} Reps Logged`, description: `Log ${repVal.toLocaleString()} total reps across all exercises.`,
      category: "Volume", icon: "plates", tier: i >= 2 ? "gold" : i >= 1 ? "silver" : "bronze",
      check: (stats) => {
        const earned = stats.totalReps >= repVal;
        return { earned, progress: Math.min(1, stats.totalReps / repVal), label: `${stats.totalReps.toLocaleString()} / ${repVal.toLocaleString()} reps` };
      },
    });
  });

  DOTS_TIERS.forEach((t, i) => {
    achievements.push({
      id: `dots_${t.name.replace(/\s/g, "")}`, name: `DOTS: ${t.name}`, description: `Reach a DOTS score of ${t.min} (based on best Squat+Bench+Deadlift total).`,
      category: "Strength Score", icon: "medal", tier: i >= 3 ? "gold" : i >= 1 ? "silver" : "bronze",
      check: (stats) => {
        if (stats.dots == null) return { earned: false, progress: 0, label: "Need Squat, Bench & Deadlift PRs + bodyweight" };
        const earned = stats.dots >= t.min;
        return { earned, progress: Math.min(1, stats.dots / t.min), label: `DOTS ${stats.dots} / ${t.min}` };
      },

  });

  TM_LIFTS.forEach((lift) => {
    RANK_TIERS.forEach((tierName, i) => {
      achievements.push({
        id: `rank_${lift.key}_${tierName}`, name: `${tierName} ${lift.label}`, description: `Reach ${tierName} strength-to-bodyweight ratio on ${lift.label}.`,
        category: "Strength Score", icon: "star", tier: i >= 3 ? "gold" : i >= 1 ? "silver" : "bronze",
        check: (stats) => {
          const ls = stats.mainLiftStats[lift.key];
          if (!ls || !ls.ratio) return { earned: false, progress: 0, label: "Not enough data" };
          return { earned: null, progress: null, label: null, _needsGender: true, _lift: lift.key, _ratio: ls.ratio };

      });

  });

  [10, 50, 100, 250, 500].forEach((n, i) => {

      check: (stats) => {

        return { earned, progress: Math.min(1, stats.workoutCount / n), label: `${stats.workoutCount} / ${n} sessions` };
