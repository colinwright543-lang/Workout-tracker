  [4, 12, 26, 52].forEach((weeks, i) => {
    achievements.push({
      id: `streak_${weeks}`, name: `${weeks}-Week Streak`, description: `Train at least once in ${weeks} consecutive weeks.`, category: "Consistency", icon: "flame", tier: i >= 2 ? "gold" : i >= 1 ? "silver" : "bronze",
      check: (stats) => {
        const earned = stats.longestStreak >= weeks;
        return { earned, progress: Math.min(1, stats.longestStreak / weeks), label: `${stats.longestStreak} / ${weeks} weeks (longest)` };
      },
    });
  });

  achievements.push({
    id: "pr_burst", name: "PR Burst", description: "Set 5 new PRs within a 30-day window.", category: "Consistency", icon: "flame", tier: "silver",
    check: (stats) => ({ earned: stats.recentPRCount >= 5, progress: Math.min(1, stats.recentPRCount / 5), label: `${stats.recentPRCount} / 5 recent PRs` }),
  });

  return achievements;
}

function resolveAchievement(ach, stats, gender) {
  const result = ach.check(stats);
  if (result._needsGender) {
    const tierInfo = tierForRatio(result._lift, result._ratio, gender);
    const targetIdx = RANK_TIERS.indexOf(ach.name.split(" ")[0]);
    const earned = tierInfo && tierInfo.tierIdx >= targetIdx;
    const table = RANK_TABLE_KG[result._lift][gender === "F" ? "F" : "M"];
    const threshold = table[targetIdx];
    const progress = Math.min(1, result._ratio / threshold);
    return { earned, progress, label: `${round(result._ratio, 2)}x / ${threshold}x bodyweight` };
  }
  return result;
}

const ICONS = { barbell: Dumbbell, plates: Award, medal: Medal, star: Star, flame: Flame };
const TIER_COLOR = { bronze: "#a0622d", silver: "#8a8a92", gold: GOLD };

function findExIdFuzzy(exercises, name) {
  const clean = name.trim().toLowerCase();
  let found = exercises.find((e) => e.name.toLowerCase() === clean);
  if (found) return { id: found.id, isNew: false, matchedName: found.name };
  found = exercises.find((e) => e.name.toLowerCase().includes(clean) || clean.includes(e.name.toLowerCase()));
  if (found) return { id: found.id, isNew: false, matchedName: found.name };
  return { id: null, isNew: true, matchedName: null };
}

function parseProgramText(text, exercises) {
  const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
  const days = [];
  let current = null;
  const unmatched = [];
  const exerciseLineRe = /^(.+?)\s+(\d+)\s*[x×]\s*([\d\-+]+)(?:\s*@\s*(\d+(?:\.\d)?))?(?:\s*[,@]?\s*(\d+)\s*lbs?)?/i;

  lines.forEach((line) => {
    const m = line.match(exerciseLineRe);
    if (m) {
      const rawName = m[1], sets = m[2], reps = m[3], rpe = m[4], weight = m[5];
      if (!current) { current = { id: uid(), name: `Day ${days.length + 1}`, exercises: [] }; days.push(current); }
      const match = findExIdFuzzy(exercises, rawName);
      if (match.isNew) unmatched.push(rawName.trim());
      current.exercises.push({ exerciseId: match.id, mode: "plain", sets: Number(sets) || 1, repRange: reps || "", targetRpe: rpe || "", targetWeight: weight || "", _rawName: match.isNew ? rawName.trim() : null });
    } else {
      const cleanedHeader = line.replace(/:$/, "").trim();
      if (cleanedHeader) { current = { id: uid(), name: cleanedHeader, exercises: [] }; days.push(current); }
    }
  });
  return { days: days.filter((d) => d.exercises.length > 0), unmatched: Array.from(new Set(unmatched)) };
}

function parseMobileSyncCode(text, exercises) {
  const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
  if (lines[0] !== "WTSYNC-v1") return { logs: [], unmatched: [], error: "This doesn't look like a valid sync code (missing WTSYNC-v1 header)." };
  const unmatched = [];
  const logs = [];
  for (let i = 1; i < lines.length; i++) {
    const parts = lines[i].split("::");
    if (parts.length < 3) continue;
    const date = parts[0], dayName = parts[1], exPartsStr = parts[2];
    const exParts = exPartsStr.split("|").filter(Boolean);
    const entries = [];
    exParts.forEach((part) => {
      const colonIdx = part.indexOf(":");
      if (colonIdx === -1) return;
      const name = part.slice(0, colonIdx);
      const setsStr = part.slice(colonIdx + 1);
      const sets = setsStr.split(",").filter(Boolean).map((s) => {
        const m = s.match(/^([\d.]+)x(\d+)(?:@([\d.]+))?$/);
        if (!m) return null;
        return { weight: Number(m[1]) || 0, reps: Number(m[2]) || 0, rpe: m[3] ? Number(m[3]) : null };
      }).filter(Boolean);
      if (sets.length === 0) return;
      const match = findExIdFuzzy(exercises, name);
      if (match.isNew) unmatched.push(name.trim());
      entries.push({ exerciseId: match.id, _rawName: match.isNew ? name.trim() : null, sets });
    });
    if (entries.length > 0) logs.push({ date, dayName, entries });
  }
  return { logs, unmatched: Array.from(new Set(unmatched)), error: null };
}

function MobileSyncImport({ exercises, setExercises, logs, setLogs }) {
  const [showImport, setShowImport] = useState(false);
  const [text, setText] = useState("");
  const [parsed, setParsed] = useState(null);

  function handleParse() { setParsed(parseMobileSyncCode(text, exercises)); }

  function confirmImport() {
    if (!parsed || parsed.error) return;
    let workingExercises = exercises;
    const createdMap = {};
    parsed.unmatched.forEach((rawName) => {
      const newEx = { id: uid(), name: rawName, muscle: MUSCLE_GROUPS[0], equipment: "Other", type: "Compound", isMain: false };
      createdMap[rawName] = newEx.id;
      workingExercises = [...workingExercises, newEx];
    });
    if (parsed.unmatched.length > 0) setExercises(workingExercises);

    const newLogs = parsed.logs
      .filter((pl) => !logs.some((l) => l.date === pl.date && l.templateName === pl.dayName && l.entries.length === pl.entries.length))
      .map((pl) => ({
        id: uid(), date: pl.date, blockId: null, templateId: null, templateName: pl.dayName,
        entries: pl.entries.map((e) => ({ exerciseId: e.exerciseId || createdMap[e._rawName], sets: e.sets })),
      }));

    setLogs((prev) => [...prev, ...newLogs]);
    setText("");
    setParsed(null);
    setShowImport(false);
  }

  return (
    <div className="mb-4">
      <button onClick={() => setShowImport((s) => !s)} className="flex items-center gap-1 text-xs px-2.5 py-1.5 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}>
        📱 {showImport ? "Hide" : "Import from mobile"}
      </button>
      {showImport && (
        <PaperCard className="p-3 mt-2">
          <p className="text-xs mb-2" style={{ color: INK_SOFT }}>Paste the sync code copied from the mobile logger's "Sync to laptop" screen.</p>
          <textarea value={text} onChange={(e) => setText(e.target.value)} rows={5} placeholder={"WTSYNC-v1\n..."} className="w-full px-2 py-1.5 text-xs" style={{ ...inputStyle(), fontFamily: "monospace" }} />
          <button onClick={handleParse} disabled={!text.trim()} className="text-xs px-3 py-1.5 mt-2 nb-script" style={{ background: INK, color: PAPER_BG, borderRadius: 3, opacity: text.trim() ? 1 : 0.4 }}>Parse sync code</button>

          {parsed && (
            <div className="mt-3">
              {parsed.error ? (
                <p className="text-xs" style={{ color: ACCENT }}>{parsed.error}</p>
              ) : parsed.logs.length === 0 ? (
                <p className="text-xs" style={{ color: ACCENT }}>No workouts found in that code.</p>
              ) : (
                <>
                  <p className="text-xs mb-1.5" style={{ color: INK_SOFT }}>Found {parsed.logs.length} workout{parsed.logs.length !== 1 ? "s" : ""}:</p>
                  <ul className="text-xs mb-2" style={{ color: INK }}>
                    {parsed.logs.map((l, i) => <li key={i}>{fmtDate(l.date)} — {l.dayName} ({l.entries.length} exercises)</li>)}
                  </ul>
                  {parsed.unmatched.length > 0 && <p className="text-[11px] mb-2" style={{ color: ACCENT }}>{parsed.unmatched.length} exercise(s) not in your library will be added automatically.</p>}
                  <button onClick={confirmImport} className="text-sm px-3 py-1.5" style={{ background: ACCENT, color: "#fff", borderRadius: 3 }}>Confirm import</button>
                </>
              )}
            </div>
          )}
        </PaperCard>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("exercises");
  const [exercises, setExercises] = useState(SEED_EXERCISES);
  const [blocks, setBlocks] = useState([]);
  const [savedPrograms, setSavedPrograms] = useState([]);
  const [logs, setLogs] = useState([]);
  const [schedule, setSchedule] = useState(null);
  const [bodyweightLogs, setBodyweightLogs] = useState([]);
  const [generalNotes, setGeneralNotes] = useState("");
  const [progressSettings, setProgressSettings] = useState({ selectedTarget: null, bodyweightShown: false, detailShown: false });
  const [gender, setGender] = useState(null);
  const [unit, setUnit] = useState("lb");
  const [seenAchievementIds, setSeenAchievementIds] = useState([]);
  const [toast, setToast] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("idle");
  const [quoteSeed] = useState(() => Math.floor(Math.random() * 1000));

  const touchStartX = useRef(null);
  const touchStartY = useRef(null);
  const wheelAccumX = useRef(0);
  const wheelCooldown = useRef(false);
  const [slideDir, setSlideDir] = useState(0);
  const [animKey, setAnimKey] = useState(0);

  useEffect(() => {
    try {
      const res = storage.get(STORAGE_KEY);
      if (res && res.value) {
        const data = JSON.parse(res.value);
        if (data.exercises) setExercises(data.exercises);
        if (data.blocks) setBlocks(data.blocks);
        if (data.savedPrograms) setSavedPrograms(data.savedPrograms);
        if (data.logs) setLogs(data.logs);
        if (data.schedule) setSchedule(data.schedule);
        if (data.bodyweightLogs) setBodyweightLogs(data.bodyweightLogs);
        if (data.progressSettings) setProgressSettings((prev) => ({ ...prev, ...data.progressSettings }));
        if (data.generalNotes) setGeneralNotes(data.generalNotes);
        if (data.gender) setGender(data.gender);
        if (data.unit) setUnit(data.unit);
        if (data.seenAchievementIds) setSeenAchievementIds(data.seenAchievementIds);
      }
    } catch (e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    setSaveStatus("saving");
    const t = setTimeout(() => {
      try {
        const result = storage.set(STORAGE_KEY, JSON.stringify({ exercises, blocks, savedPrograms, logs, schedule, bodyweightLogs, progressSettings, generalNotes, gender, unit, seenAchievementIds }));
        setSaveStatus(result ? "saved" : "error");
      } catch (e) { setSaveStatus("error"); }
    }, 400);
    return () => clearTimeout(t);
  }, [exercises, blocks, savedPrograms, logs, schedule, bodyweightLogs, progressSettings, generalNotes, gender, unit, seenAchievementIds, loaded]);

  const exerciseById = useCallback((id) => exercises.find((e) => e.id === id), [exercises]);

  function updateBlock(id, patch) { setBlocks((prev) => prev.map((b) => (b.id === id ? { ...b, ...patch } : b))); }

  const userStats = useMemo(() => buildUserStats({ logs, exercises, bodyweightLogs, unit, gender }), [logs, exercises, bodyweightLogs, unit, gender]);
  const achievementsConfig = useMemo(() => buildAchievements(unit), [unit]);
  const resolvedAchievements = useMemo(() => {
    if (!gender) return [];
    return achievementsConfig.map((ach) => ({ ...ach, result: resolveAchievement(ach, userStats, gender) }));
  }, [achievementsConfig, userStats, gender]);

  useEffect(() => {
    if (!loaded || resolvedAchievements.length === 0) return;
    const newlyEarned = resolvedAchievements.filter((a) => a.result.earned && !seenAchievementIds.includes(a.id));
    if (newlyEarned.length > 0) {
      setToast(newlyEarned[0]);
      setSeenAchievementIds((prev) => [...prev, ...newlyEarned.map((a) => a.id)]);
      const t = setTimeout(() => setToast(null), 4500);
      return () => clearTimeout(t);
    }
  }, [resolvedAchievements, loaded]);

  function goToTab(newTab) {
    const curIdx = TAB_ORDER.indexOf(tab);
    const newIdx = TAB_ORDER.indexOf(newTab);
    setSlideDir(newIdx > curIdx ? 1 : newIdx < curIdx ? -1 : 0);
    setAnimKey((k) => k + 1);
    setTab(newTab);
  }

  function handleTouchStart(e) { touchStartX.current = e.touches[0].clientX; touchStartY.current = e.touches[0].clientY; }
  function handleTouchEnd(e) {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    const dy = e.changedTouches[0].clientY - touchStartY.current;
    touchStartX.current = null;
    if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    const curIdx = TAB_ORDER.indexOf(tab);
    if (dx < 0 && curIdx < TAB_ORDER.length - 1) goToTab(TAB_ORDER[curIdx + 1]);
    else if (dx > 0 && curIdx > 0) goToTab(TAB_ORDER[curIdx - 1]);
  }
  function handleWheel(e) {
    if (Math.abs(e.deltaX) < Math.abs(e.deltaY) * 1.2) return;
    if (wheelCooldown.current) return;
    wheelAccumX.current += e.deltaX;
    const THRESHOLD = 70;
    if (Math.abs(wheelAccumX.current) > THRESHOLD) {
      const curIdx = TAB_ORDER.indexOf(tab);
      if (wheelAccumX.current > 0 && curIdx < TAB_ORDER.length - 1) goToTab(TAB_ORDER[curIdx + 1]);
      else if (wheelAccumX.current < 0 && curIdx > 0) goToTab(TAB_ORDER[curIdx - 1]);
      wheelAccumX.current = 0;
      wheelCooldown.current = true;
      setTimeout(() => { wheelCooldown.current = false; }, 500);
    }
  }

  return (
    <div style={{ maxWidth: 940, margin: "0 auto", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif", backgroundColor: PAPER_BG, backgroundImage: "radial-gradient(circle at 20% 30%, rgba(139,107,58,0.08) 0%, transparent 45%), radial-gradient(circle at 80% 70%, rgba(139,107,58,0.08) 0%, transparent 45%), repeating-linear-gradient(0deg, rgba(120,90,50,0.04) 0px, transparent 1px, transparent 26px)", color: INK, minHeight: "100vh", position: "relative", overflowX: "hidden" }}>
      <style>{`
        .nb-header { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; }
        .nb-script { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(139,107,58,0.4); border-radius: 4px; }
        @keyframes slideInLeft { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(-40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .tab-anim-1 { animation: slideInLeft 0.28s ease-out; }
        .tab-anim--1 { animation: slideInRight 0.28s ease-out; }
        .tab-anim-0 { animation: fadeIn 0.2s ease-out; }
        .icon-btn { min-width: 30px; min-height: 30px; display: inline-flex; align-items: center; justify-content: center; }
        @media (max-width: 480px) { .set-row { flex-wrap: wrap; } .set-row > input { min-height: 34px; } }
      `}</style>

      <header className="px-3 sm:px-4 py-3 sm:py-4 flex items-center justify-between sticky top-0 z-10 gap-2" style={{ backgroundColor: PAPER_BG, borderBottom: `2px solid ${INK}`, boxShadow: "0 2px 0 rgba(59,47,30,0.15)" }}>
        <div className="flex items-center gap-2 min-w-0">
          <DumbbellDoodle size={28} />
          <h1 className="nb-header text-base sm:text-xl tracking-wide truncate" style={{ color: INK }}>Workout Tracker</h1>
        </div>
        <SaveIndicator status={saveStatus} />
      </header>

      <p className="nb-script text-center text-base px-4 pt-3" style={{ color: INK_SOFT }}>"{randomQuote(quoteSeed)}"</p>

      <nav className="flex px-4 mt-2 overflow-x-auto gap-1" style={{ borderBottom: `2px solid ${INK}` }}>
        <TabButton icon={<Dumbbell size={15} />} label="Exercises" active={tab === "exercises"} onClick={() => goToTab("exercises")} />
        <TabButton icon={<LayoutGrid size={15} />} label="Program" active={tab === "program"} onClick={() => goToTab("program")} />
        <TabButton icon={<CalendarIcon size={15} />} label="Calendar" active={tab === "calendar"} onClick={() => goToTab("calendar")} />
        <TabButton icon={<ClipboardList size={15} />} label="Log workout" active={tab === "log"} onClick={() => goToTab("log")} />
        <TabButton icon={<TrendingUp size={15} />} label="Progress" active={tab === "progress"} onClick={() => goToTab("progress")} />
        <TabButton icon={<Trophy size={15} />} label="Trophies" active={tab === "trophies"} onClick={() => goToTab("trophies")} />
        <TabButton icon={<StickyNote size={15} />} label="Notes" active={tab === "notes"} onClick={() => goToTab("notes")} />
      </nav>

      <main className="px-3 sm:px-4 py-4 sm:py-5" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd} onWheel={handleWheel}>
        <div key={animKey} className={`tab-anim-${slideDir}`}>
          {tab === "exercises" && <ExercisesTab exercises={exercises} setExercises={setExercises} />}
          {tab === "program" && <ProgramTab exercises={exercises} setExercises={setExercises} blocks={blocks} setBlocks={setBlocks} updateBlock={updateBlock} savedPrograms={savedPrograms} setSavedPrograms={setSavedPrograms} />}
          {tab === "calendar" && <CalendarTab blocks={blocks} logs={logs} schedule={schedule} setSchedule={setSchedule} />}
          {tab === "log" && <LogTab exercises={exercises} setExercises={setExercises} blocks={blocks} logs={logs} setLogs={setLogs} exerciseById={exerciseById} schedule={schedule} bodyweightLogs={bodyweightLogs} setBodyweightLogs={setBodyweightLogs} unit={unit} />}
          {tab === "progress" && <ProgressTab exercises={exercises} logs={logs} blocks={blocks} schedule={schedule} exerciseById={exerciseById} bodyweightLogs={bodyweightLogs} setBodyweightLogs={setBodyweightLogs} progressSettings={progressSettings} setProgressSettings={setProgressSettings} />}
          {tab === "trophies" && <TrophiesTab userStats={userStats} resolvedAchievements={resolvedAchievements} gender={gender} setGender={setGender} unit={unit} setUnit={setUnit} />}
          {tab === "notes" && <NotesTab generalNotes={generalNotes} setGeneralNotes={setGeneralNotes} blocks={blocks} updateBlock={updateBlock} />}
        </div>
      </main>

      {toast && (
        <div className="toast-anim fixed bottom-4 left-1/2 z-50 px-4 py-2.5 rounded-md flex items-center gap-2" style={{ transform: "translateX(-50%)", background: INK, color: PAPER_BG, boxShadow: "0 4px 12px rgba(0,0,0,0.3)", maxWidth: "90vw" }}>
          <Trophy size={16} style={{ color: GOLD }} />
          <span className="text-sm nb-script">Achievement unlocked: <strong>{toast.name}</strong></span>
        </div>
      )}
    </div>
  );
}

function DumbbellDoodle({ size = 24 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 60 30" fill="none">
      <rect x="2" y="8" width="6" height="14" rx="1.5" stroke={INK} strokeWidth="2" fill="none" />
      <rect x="10" y="11" width="3" height="8" rx="1" stroke={INK} strokeWidth="1.8" fill="none" />
      <rect x="13" y="13.5" width="34" height="3" stroke={INK} strokeWidth="1.8" fill="none" />
      <rect x="47" y="11" width="3" height="8" rx="1" stroke={INK} strokeWidth="1.8" fill="none" />
      <rect x="52" y="8" width="6" height="14" rx="1.5" stroke={INK} strokeWidth="2" fill="none" />
    </svg>
  );
}

function SaveIndicator({ status }) {
  if (status === "idle") return null;
  const map = { saving: { text: "Saving…", color: INK_SOFT }, saved: { text: "Saved ✓", color: "#3f6b3f" }, error: { text: "Save failed", color: ACCENT } };
  const s = map[status] || map.saving;
  return <span className="nb-script text-base flex items-center gap-1" style={{ color: s.color }}><Save size={13} /> {s.text}</span>;
}

function TabButton({ icon, label, active, onClick }) {
  return (
    <button onClick={onClick} className="flex items-center gap-1.5 px-3 py-2.5 text-sm whitespace-nowrap nb-script" style={{ borderBottom: active ? `3px solid ${ACCENT}` : "3px solid transparent", color: active ? INK : INK_SOFT, fontWeight: active ? 700 : 500, fontSize: "1.05rem" }}>
      {icon}{label}
    </button>
  );
}

function PaperCard({ children, className = "", style = {} }) {
  return <div className={className} style={{ background: "rgba(255,252,240,0.55)", border: `1.5px solid ${INK}`, borderRadius: "3px", boxShadow: "2px 3px 0 rgba(59,47,30,0.12)", ...style }}>{children}</div>;
}

function inputStyle() { return { border: `1.5px solid ${INK}`, borderRadius: 3, background: "rgba(255,252,240,0.7)", color: INK }; }

function ExercisesTab({ exercises, setExercises }) {
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filterMuscle, setFilterMuscle] = useState("All");
  const [search, setSearch] = useState("");

  function upsert(ex) {
    setExercises((prev) => {
      const exists = prev.some((p) => p.id === ex.id);
      return exists ? prev.map((p) => (p.id === ex.id ? ex : p)) : [...prev, ex];
    });
    setShowForm(false);
    setEditing(null);
  }
  function remove(id) { setExercises((prev) => prev.filter((e) => e.id !== id)); }

  let filtered = filterMuscle === "All" ? exercises : exercises.filter((e) => e.muscle === filterMuscle);
  if (search.trim()) {
    const q = search.trim().toLowerCase();
    filtered = filtered.filter((e) => e.name.toLowerCase().includes(q));
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-3 gap-2 flex-wrap">
        <div className="flex items-center gap-2 flex-wrap">
          <select value={filterMuscle} onChange={(e) => setFilterMuscle(e.target.value)} className="text-sm px-2 py-1.5 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, background: "rgba(255,252,240,0.7)", color: INK }}>
            <option>All</option>
            {MUSCLE_GROUPS.map((m) => <option key={m}>{m}</option>)}
          </select>
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search exercises..." className="text-sm px-2 py-1.5 w-44 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, background: "rgba(255,252,240,0.7)", color: INK }} />
          <span className="text-xs nb-script" style={{ color: INK_SOFT }}>{filtered.length} of {exercises.length}</span>
        </div>
        <button onClick={() => { setEditing(null); setShowForm(true); }} className="flex items-center gap-1 text-sm px-3 py-1.5 nb-script" style={{ background: INK, color: PAPER_BG, borderRadius: 3 }}><Plus size={15} /> New exercise</button>
      </div>

      {showForm && <ExerciseForm initial={editing} onSave={upsert} onCancel={() => { setShowForm(false); setEditing(null); }} />}

      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-3 max-h-[560px] overflow-y-auto pr-1">
        {filtered.map((ex) => (
          <PaperCard key={ex.id} className="p-3 flex items-start justify-between">
            <div>
              <div className="flex items-center gap-1.5 flex-wrap">
                <p className="font-medium text-sm nb-script" style={{ fontSize: "1.05rem" }}>{ex.name}</p>
                {ex.isMain && <span className="text-[10px] px-1.5 py-0.5 rounded nb-script" style={{ background: "#e8c45a55", color: "#7a5a10", border: "1px solid #c9a23a" }}>Main lift</span>}
                {ex.realOneRM != null && <span className="text-[10px] px-1.5 py-0.5 rounded nb-script" style={{ background: "#d9e4f0", color: "#2d4a5a", border: "1px solid #b8cce0" }}>Real 1RM: {ex.realOneRM}</span>}
              </div>
              <p className="text-xs mt-0.5" style={{ color: INK_SOFT }}>{ex.muscle} · {ex.equipment} · {ex.type}</p>
            </div>
            <div className="flex gap-0.5">
              <button onClick={() => { setEditing(ex); setShowForm(true); }} className="icon-btn" style={{ color: INK_SOFT }}><Edit2 size={15} /></button>
              <button onClick={() => remove(ex.id)} className="icon-btn" style={{ color: INK_SOFT }}><Trash2 size={15} /></button>
            </div>
          </PaperCard>
        ))}
        {filtered.length === 0 && <p className="text-sm col-span-2" style={{ color: INK_SOFT }}>No exercises match.</p>}
      </div>
    </div>
  );
}

function ExerciseForm({ initial, onSave, onCancel }) {
  const [name, setName] = useState(initial?.name || "");
  const [muscle, setMuscle] = useState(initial?.muscle || MUSCLE_GROUPS[0]);
  const [equipment, setEquipment] = useState(initial?.equipment || EQUIPMENT[0]);
  const [type, setType] = useState(initial?.type || EX_TYPES[0]);
  const [isMain, setIsMain] = useState(initial?.isMain || false);
  const [realOneRM, setRealOneRM] = useState(initial?.realOneRM ?? "");

  function submit() {
    if (!name.trim()) return;
    onSave({ id: initial?.id || uid(), name: name.trim(), muscle, equipment, type, isMain, realOneRM: realOneRM === "" ? null : Number(realOneRM) });
  }

  return (
    <PaperCard className="p-4 mb-3">
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div className="sm:col-span-2">
          <label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Exercise name</label>
          <input value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Pause Bench Press" className="w-full px-2 py-1.5 text-sm" style={inputStyle()} />
        </div>
        <div>
          <label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Muscle group</label>
          <select value={muscle} onChange={(e) => setMuscle(e.target.value)} className="w-full px-2 py-1.5 text-sm" style={inputStyle()}>{MUSCLE_GROUPS.map((m) => <option key={m}>{m}</option>)}</select>
        </div>
        <div>
          <label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Equipment</label>
          <select value={equipment} onChange={(e) => setEquipment(e.target.value)} className="w-full px-2 py-1.5 text-sm" style={inputStyle()}>{EQUIPMENT.map((m) => <option key={m}>{m}</option>)}</select>
        </div>
        <div>
          <label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Type</label>
          <select value={type} onChange={(e) => setType(e.target.value)} className="w-full px-2 py-1.5 text-sm" style={inputStyle()}>{EX_TYPES.map((m) => <option key={m}>{m}</option>)}</select>
        </div>
        <div className="flex items-center gap-2 pt-5">
          <input type="checkbox" checked={isMain} onChange={(e) => setIsMain(e.target.checked)} id="ismain" />
          <label htmlFor="ismain" className="text-sm" style={{ color: INK }}>Track as main lift (1RM trends)</label>
        </div>
        <div className="sm:col-span-2">
          <label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Real 1RM (optional — overrides the estimated 1RM everywhere if set)</label>
          <input type="number" value={realOneRM} onChange={(e) => setRealOneRM(e.target.value)} placeholder="e.g. 315" className="w-full px-2 py-1.5 text-sm" style={inputStyle()} />
        </div>
      </div>
      <div className="flex gap-2 mt-3 justify-end">
        <button onClick={onCancel} className="text-sm px-3 py-1.5" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}>Cancel</button>
        <button onClick={submit} className="text-sm px-3 py-1.5" style={{ background: INK, color: PAPER_BG, borderRadius: 3 }}>Save</button>
      </div>
    </PaperCard>
  );
}

function ProgramTab({ exercises, setExercises, blocks, setBlocks, updateBlock, savedPrograms, setSavedPrograms }) {
  const [expandedBlock, setExpandedBlock] = useState(null);
  const [showBlockForm, setShowBlockForm] = useState(false);
  const [showProgramPicker, setShowProgramPicker] = useState(false);
  const [showCustomBuilder, setShowCustomBuilder] = useState(false);
  const [showSavedPrograms, setShowSavedPrograms] = useState(false);
  const [showArchived, setShowArchived] = useState(false);

  function addBlock(block) {
    setBlocks((prev) => [...prev, block]);
    setShowBlockForm(false); setShowProgramPicker(false); setShowCustomBuilder(false); setShowSavedPrograms(false);
    setExpandedBlock(block.id);
  }
  function removeBlock(id) { setBlocks((prev) => prev.filter((b) => b.id !== id)); }
  function saveAsTemplate(block) { setSavedPrograms((prev) => [...prev, { ...block, id: uid(), savedAt: todayISO() }]); }
  function loadSavedProgram(template) {
    addBlock({ ...template, id: uid(), startDate: todayISO(), templates: template.templates.map((t) => ({ ...t, id: uid() })) });
  }
  function removeSavedProgram(id) { setSavedPrograms((prev) => prev.filter((p) => p.id !== id)); }

  const activeBlocks = blocks.filter((b) => !b.archived);
  const archivedBlocks = blocks.filter((b) => b.archived);

  return (
    <div>
      <div className="flex items-center justify-between mb-4 gap-2 flex-wrap">
        <p className="text-sm nb-script" style={{ color: INK_SOFT }}>{activeBlocks.length} active block{activeBlocks.length !== 1 ? "s" : ""}</p>
        <div className="flex gap-2 flex-wrap">
          {archivedBlocks.length > 0 && <button onClick={() => setShowArchived((s) => !s)} className="flex items-center gap-1 text-sm px-3 py-1.5 nb-script" style={{ border: `1.5px solid ${INK_SOFT}`, borderRadius: 3, color: INK_SOFT }}>{showArchived ? "Hide" : "Show"} archived ({archivedBlocks.length})</button>}
          {savedPrograms.length > 0 && <button onClick={() => setShowSavedPrograms(true)} className="flex items-center gap-1 text-sm px-3 py-1.5 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}><Copy size={15} /> My saved programs ({savedPrograms.length})</button>}
          <button onClick={() => setShowProgramPicker(true)} className="flex items-center gap-1 text-sm px-3 py-1.5 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}><Sparkles size={15} /> Start from a program</button>
          <button onClick={() => setShowCustomBuilder(true)} className="flex items-center gap-1 text-sm px-3 py-1.5 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}><Edit2 size={15} /> Custom program</button>
          <button onClick={() => setShowBlockForm(true)} className="flex items-center gap-1 text-sm px-3 py-1.5 nb-script" style={{ background: INK, color: PAPER_BG, borderRadius: 3 }}><Plus size={15} /> New blank block</button>
        </div>
      </div>

      {showSavedPrograms && (
        <PaperCard className="p-4 mb-3">
          <div className="flex items-center justify-between mb-2">
            <p className="text-sm font-medium nb-script" style={{ fontSize: "1.1rem" }}>My saved programs</p>
            <button onClick={() => setShowSavedPrograms(false)} className="p-1" style={{ color: INK_SOFT }}><X size={15} /></button>
          </div>
          <div className="space-y-2">
            {savedPrograms.map((p) => (
              <div key={p.id} className="flex items-center justify-between rounded-md p-2.5" style={{ border: "1px solid rgba(59,47,30,0.2)" }}>
                <div><p className="text-sm font-medium nb-script">{p.name}</p><p className="text-xs" style={{ color: INK_SOFT }}>{p.templates.length} days · saved {fmtDate(p.savedAt)}</p></div>
                <div className="flex gap-2">
                  <button onClick={() => loadSavedProgram(p)} className="text-xs px-2.5 py-1" style={{ background: INK, color: PAPER_BG, borderRadius: 3 }}>Use this</button>
                  <button onClick={() => removeSavedProgram(p.id)} className="p-1" style={{ color: INK_SOFT }}><Trash2 size={14} /></button>
                </div>
              </div>
            ))}
          </div>
        </PaperCard>
      )}

      {showProgramPicker && <ProgramPicker exercises={exercises} onCreate={addBlock} onCancel={() => setShowProgramPicker(false)} />}
      {showCustomBuilder && <CustomProgramBuilder exercises={exercises} setExercises={setExercises} onCreate={addBlock} onCancel={() => setShowCustomBuilder(false)} />}
      {showBlockForm && <BlockForm onSave={addBlock} onCancel={() => setShowBlockForm(false)} />}

      <div className="space-y-2">
        {activeBlocks.map((block) => (
          <BlockCard key={block.id} block={block} exercises={exercises} setExercises={setExercises} expanded={expandedBlock === block.id} onToggle={() => setExpandedBlock(expandedBlock === block.id ? null : block.id)} onUpdate={(patch) => updateBlock(block.id, patch)} onRemove={() => removeBlock(block.id)} onSaveTemplate={() => saveAsTemplate(block)} onArchiveToggle={() => updateBlock(block.id, { archived: !block.archived })} />
        ))}
        {activeBlocks.length === 0 && !showBlockForm && !showProgramPicker && !showCustomBuilder && <p className="text-sm nb-script" style={{ color: INK_SOFT }}>No active blocks. Start from a program, build a custom one, or open a blank page.</p>}
      </div>

      {showArchived && archivedBlocks.length > 0 && (
        <div className="mt-4">
          <p className="text-xs mb-2" style={{ color: INK_SOFT }}>Archived (kept for reference, not shown by default):</p>
          <div className="space-y-2">
            {archivedBlocks.map((block) => (
              <BlockCard key={block.id} block={block} exercises={exercises} setExercises={setExercises} expanded={expandedBlock === block.id} onToggle={() => setExpandedBlock(expandedBlock === block.id ? null : block.id)} onUpdate={(patch) => updateBlock(block.id, patch)} onRemove={() => removeBlock(block.id)} onSaveTemplate={() => saveAsTemplate(block)} onArchiveToggle={() => updateBlock(block.id, { archived: !block.archived })} />
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ProgramPicker({ exercises, onCreate, onCancel }) {
  const [selected, setSelected] = useState(null);
  const [mode, setMode] = useState("blank");
  const [squatTM, setSquatTM] = useState(225);
  const [benchTM, setBenchTM] = useState(155);
  const [deadliftTM, setDeadliftTM] = useState(275);
  const [ohpTM, setOhpTM] = useState(95);

  const def = PROGRAM_DEFS.find((p) => p.id === selected);

  function create() {
    if (!def) return;
    if (selected === "531") {
      const tms = { squat: Number(squatTM), bench: Number(benchTM), deadlift: Number(deadliftTM), ohp: Number(ohpTM) };
      if (mode === "quickstart") onCreate(quickStart531(exercises, tms));
      else { const block = blankBlock("5/3/1 Cycle", "Intensity", 4, def.dayNames, "531"); block.trainingMaxes = tms; onCreate(block); }
      return;
    }
    if (mode === "quickstart") {
      if (selected === "5x5") return onCreate(quickStart5x5(exercises));
      if (selected === "ppl3") return onCreate(quickStartPPL(exercises, false));
      if (selected === "ppl6") return onCreate(quickStartPPL(exercises, true));
      if (selected === "upperlower") return onCreate(quickStartUpperLower(exercises));
      if (selected === "ulppl") {
        const ul = quickStartUpperLower(exercises);
        const ppl = quickStartPPL(exercises, false);
        const block = blankBlock("UL/PPL Hybrid", "Volume", 6, def.dayNames, "ulppl");
        block.templates[0].exercises = ul.templates[0].exercises;
        block.templates[1].exercises = ul.templates[1].exercises;
        block.templates[2].exercises = ppl.templates[0].exercises;
        block.templates[3].exercises = ppl.templates[1].exercises;
        block.templates[4].exercises = ppl.templates[2].exercises;
        return onCreate(block);
      }
    }
    const weeks = selected === "5x5" ? 8 : 6;
    const programKey = selected === "ppl3" || selected === "ppl6" ? "ppl" : selected;
    onCreate(blankBlock(def.name, "Volume", weeks, def.dayNames, programKey));
  }

  return (
    <PaperCard className="p-4 mb-3">
      <p className="text-sm font-medium mb-2 nb-script" style={{ fontSize: "1.1rem" }}>Choose a program</p>
      <div className="space-y-2 mb-3">
        {PROGRAM_DEFS.map((p) => (
          <label key={p.id} className="flex items-start gap-2 p-2.5 cursor-pointer" style={{ border: `1.5px solid ${selected === p.id ? ACCENT : INK}`, borderRadius: 3, background: "rgba(255,252,240,0.7)" }}>
            <input type="radio" name="program" checked={selected === p.id} onChange={() => setSelected(p.id)} className="mt-1" />
            <div><p className="text-sm font-medium nb-script" style={{ fontSize: "1.05rem" }}>{p.name}</p><p className="text-xs" style={{ color: INK_SOFT }}>{p.desc}</p></div>
          </label>
        ))}
      </div>

      {def && (
        <PaperCard className="p-3 mb-3">
          <p className="text-xs mb-2" style={{ color: INK_SOFT }}>How should the days be filled in?</p>
          <div className="flex gap-2 mb-3">
            <button onClick={() => setMode("blank")} className="text-xs px-2.5 py-1.5 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, background: mode === "blank" ? INK : "transparent", color: mode === "blank" ? PAPER_BG : INK }}>Build from scratch ({def.dayNames.length} blank days)</button>
            <button onClick={() => setMode("quickstart")} className="text-xs px-2.5 py-1.5 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, background: mode === "quickstart" ? INK : "transparent", color: mode === "quickstart" ? PAPER_BG : INK }}>Quick-start (pre-filled)</button>
          </div>
          {selected === "531" && (
            <div>
              <p className="text-xs mb-2" style={{ color: INK_SOFT }}>Enter training maxes (convention: ~90% of true 1RM). These apply to any 5/3/1-mode exercise in this block, and percentages auto-advance weekly from today's date.</p>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                <div><label className="text-[10px] block mb-0.5" style={{ color: INK_SOFT }}>Squat TM</label><input type="number" value={squatTM} onChange={(e) => setSquatTM(e.target.value)} className="w-full px-2 py-1 text-xs" style={inputStyle()} /></div>
                <div><label className="text-[10px] block mb-0.5" style={{ color: INK_SOFT }}>Bench TM</label><input type="number" value={benchTM} onChange={(e) => setBenchTM(e.target.value)} className="w-full px-2 py-1 text-xs" style={inputStyle()} /></div>
                <div><label className="text-[10px] block mb-0.5" style={{ color: INK_SOFT }}>Deadlift TM</label><input type="number" value={deadliftTM} onChange={(e) => setDeadliftTM(e.target.value)} className="w-full px-2 py-1 text-xs" style={inputStyle()} /></div>
                <div><label className="text-[10px] block mb-0.5" style={{ color: INK_SOFT }}>OHP TM</label><input type="number" value={ohpTM} onChange={(e) => setOhpTM(e.target.value)} className="w-full px-2 py-1 text-xs" style={inputStyle()} /></div>
              </div>
            </div>
          )}
        </PaperCard>
      )}

      <div className="flex gap-2 justify-end">
        <button onClick={onCancel} className="text-sm px-3 py-1.5" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}>Cancel</button>
        <button onClick={create} disabled={!selected} className="text-sm px-3 py-1.5" style={{ background: INK, color: PAPER_BG, borderRadius: 3, opacity: selected ? 1 : 0.4 }}>Create block</button>
      </div>
    </PaperCard>
  );
}

function ExerciseCombobox({ exercises, setExercises, value, onChange, placeholder = "Search exercises..." }) {
  const [query, setQuery] = useState("");
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);
  const selected = exercises.find((e) => e.id === value);

  useEffect(() => {
    function onClickOutside(e) { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", onClickOutside);
    return () => document.removeEventListener("mousedown", onClickOutside);
  }, []);

  const q = query.trim().toLowerCase();
  const filtered = q ? exercises.filter((e) => e.name.toLowerCase().includes(q)) : exercises;
  const exactMatch = exercises.some((e) => e.name.toLowerCase() === q);

  function selectExercise(ex) { onChange(ex.id); setQuery(""); setOpen(false); }
  function createAndSelect() {
    if (!query.trim()) return;
    const newEx = { id: uid(), name: query.trim(), muscle: MUSCLE_GROUPS[0], equipment: "Other", type: "Compound", isMain: false };
    setExercises((prev) => [...prev, newEx]);
    onChange(newEx.id);
    setQuery(""); setOpen(false);
  }

  return (
    <div className="relative" ref={wrapRef}>
      <input value={open ? query : (selected?.name || "")} onChange={(e) => { setQuery(e.target.value); setOpen(true); }} onFocus={() => { setQuery(""); setOpen(true); }} placeholder={placeholder} className="w-full px-1.5 py-1 text-xs" style={inputStyle()} />
      {open && (
        <div className="absolute z-20 mt-0.5 w-full max-h-48 overflow-y-auto rounded-md" style={{ background: "#fffcf0", border: `1.5px solid ${INK}`, boxShadow: "2px 3px 0 rgba(59,47,30,0.15)" }}>
          {filtered.slice(0, 50).map((ex) => (
            <button key={ex.id} onClick={() => selectExercise(ex)} className="block w-full text-left px-2 py-1.5 text-xs hover:bg-black/5" style={{ color: INK }}>{ex.name} <span style={{ color: INK_SOFT }}>· {ex.muscle}</span></button>
          ))}
          {filtered.length === 0 && <p className="px-2 py-1.5 text-xs" style={{ color: INK_SOFT }}>No matches.</p>}
          {query.trim() && !exactMatch && <button onClick={createAndSelect} className="block w-full text-left px-2 py-1.5 text-xs border-t" style={{ color: ACCENT, borderColor: "rgba(59,47,30,0.15)", fontWeight: 600 }}><Plus size={11} className="inline mr-1" /> Create "{query.trim()}"</button>}
        </div>
      )}
    </div>
  );
}

function CustomProgramBuilder({ exercises, setExercises, onCreate, onCancel }) {
  const [mode, setMode] = useState("scratch");
  const [name, setName] = useState("My Custom Program");
  const [weeks, setWeeks] = useState(6);
  const [phase, setPhase] = useState("Volume");
  const [pasteText, setPasteText] = useState("");
  const [parsedDays, setParsedDays] = useState(null);
  const [unmatched, setUnmatched] = useState([]);

  function handleParse() {
    const result = parseProgramText(pasteText, exercises);
    setParsedDays(result.days);
    setUnmatched(result.unmatched);
  }

  function confirmParsed() {
    let workingExercises = exercises;
    const createdMap = {};
    unmatched.forEach((rawName) => {
      const newEx = { id: uid(), name: rawName, muscle: MUSCLE_GROUPS[0], equipment: "Other", type: "Compound", isMain: false };
      createdMap[rawName] = newEx.id;
      workingExercises = [...workingExercises, newEx];
    });
    if (unmatched.length > 0) setExercises(workingExercises);

    const finalDays = parsedDays.map((d) => ({ ...d, exercises: d.exercises.map((te) => ({ exerciseId: te.exerciseId || createdMap[te._rawName], mode: te.mode, sets: te.sets, repRange: te.repRange, targetRpe: te.targetRpe, targetWeight: te.targetWeight, tmLift: "squat" })) }));

    onCreate({ id: uid(), name: name.trim() || "My Custom Program", phase, weeks: Number(weeks) || 1, startDate: todayISO(), trainingMaxes: { squat: "", bench: "", deadlift: "", ohp: "" }, templates: finalDays });
  }

  function createBlankScratch() {
    onCreate({ id: uid(), name: name.trim() || "My Custom Program", phase, weeks: Number(weeks) || 1, startDate: todayISO(), trainingMaxes: { squat: "", bench: "", deadlift: "", ohp: "" }, templates: [] });
  }

  return (
    <PaperCard className="p-4 mb-3">
      <p className="text-sm font-medium mb-2 nb-script" style={{ fontSize: "1.1rem" }}>Custom program</p>
      <div className="flex gap-2 mb-3">
        <button onClick={() => setMode("scratch")} className="text-xs px-2.5 py-1.5 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, background: mode === "scratch" ? INK : "transparent", color: mode === "scratch" ? PAPER_BG : INK }}>Build from scratch</button>
        <button onClick={() => setMode("paste")} className="text-xs px-2.5 py-1.5 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, background: mode === "paste" ? INK : "transparent", color: mode === "paste" ? PAPER_BG : INK }}>Paste / describe a program</button>
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
        <div className="sm:col-span-2"><label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Program name</label><input value={name} onChange={(e) => setName(e.target.value)} className="w-full px-2 py-1.5 text-sm" style={inputStyle()} /></div>
        <div><label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Weeks</label><input type="number" min={1} value={weeks} onChange={(e) => setWeeks(e.target.value)} className="w-full px-2 py-1.5 text-sm" style={inputStyle()} /></div>
        <div className="sm:col-span-3">
          <label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Phase</label>
          <div className="flex gap-2">{["Volume", "Intensity", "Peak", "Deload"].map((p) => <button key={p} onClick={() => setPhase(p)} className="text-xs px-2.5 py-1" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, background: phase === p ? INK : "transparent", color: phase === p ? PAPER_BG : INK }}>{p}</button>)}</div>
        </div>
      </div>

      {mode === "scratch" ? (
        <p className="text-xs mb-3" style={{ color: INK_SOFT }}>This creates the program with no days yet — you'll build each day and its exercises afterward in the block view, same as any other block.</p>
      ) : (
        <div className="mb-3">
          <label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Paste or describe your program. One day header per line, then exercises below it like "Bench Press 4x8 @8" or "Squat 3x5 225lbs".</label>
          <textarea value={pasteText} onChange={(e) => setPasteText(e.target.value)} rows={8} placeholder={"Day 1: Push\nBench Press 4x8 @8\nOverhead Press 3x10\nTriceps Pushdown 3x12\n\nDay 2: Pull\nBarbell Row 4x8\nLat Pulldown 3x10"} className="w-full px-2 py-2 text-sm" style={{ ...inputStyle(), fontFamily: "monospace" }} />
          <button onClick={handleParse} disabled={!pasteText.trim()} className="text-xs px-3 py-1.5 mt-2 nb-script" style={{ background: INK, color: PAPER_BG, borderRadius: 3, opacity: pasteText.trim() ? 1 : 0.4 }}>Parse program</button>

          {parsedDays && (
            <div className="mt-3 rounded-md p-2.5" style={{ background: "rgba(139,107,58,0.07)", border: `1px solid rgba(59,47,30,0.2)` }}>
              <p className="text-xs mb-1.5" style={{ color: INK_SOFT }}>Parsed {parsedDays.length} day{parsedDays.length !== 1 ? "s" : ""}. Review below, then confirm to create the block (you can edit anything afterward).</p>
              {parsedDays.length === 0 && <p className="text-xs" style={{ color: ACCENT }}>Couldn't find any exercise lines — try the format "Exercise Name 3x8".</p>}
              <div className="space-y-2">
                {parsedDays.map((d, di) => (
                  <div key={di} className="text-xs" style={{ color: INK }}>
                    <span className="font-medium nb-script">{d.name}</span>
                    <ul className="ml-3">
                      {d.exercises.map((te, ei) => (
                        <li key={ei} style={{ color: te._rawName ? ACCENT : INK_SOFT }}>
                          {te._rawName ? `"${te._rawName}" (new exercise)` : (exercises.find((e) => e.id === te.exerciseId)?.name || "Unknown")} — {te.sets}×{te.repRange}{te.targetRpe ? ` @${te.targetRpe}` : ""}{te.targetWeight ? ` (${te.targetWeight} lbs)` : ""}
                        </li>
                      ))}
                    </ul>
                  </div>
                ))}
              </div>
              {unmatched.length > 0 && <p className="text-[11px] mt-2" style={{ color: ACCENT }}>{unmatched.length} exercise{unmatched.length !== 1 ? "s" : ""} not found in your library will be added automatically when you confirm.</p>}
            </div>
          )}
        </div>
      )}

      <div className="flex gap-2 justify-end mt-3">
        <button onClick={onCancel} className="text-sm px-3 py-1.5" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}>Cancel</button>
        {mode === "scratch" ? (
          <button onClick={createBlankScratch} className="text-sm px-3 py-1.5" style={{ background: INK, color: PAPER_BG, borderRadius: 3 }}>Create program</button>
        ) : (
          <button onClick={confirmParsed} disabled={!parsedDays || parsedDays.length === 0} className="text-sm px-3 py-1.5" style={{ background: INK, color: PAPER_BG, borderRadius: 3, opacity: parsedDays && parsedDays.length > 0 ? 1 : 0.4 }}>Confirm &amp; create</button>
        )}
      </div>
    </PaperCard>
  );
}

function BlockForm({ initial, onSave, onCancel }) {
  const [name, setName] = useState(initial?.name || "");
  const [phase, setPhase] = useState(initial?.phase || "Volume");
  const [weeks, setWeeks] = useState(initial?.weeks || 4);

  function submit() {
    if (!name.trim()) return;
    onSave({ id: initial?.id || uid(), name: name.trim(), phase, weeks: Number(weeks) || 1, startDate: todayISO(), trainingMaxes: { squat: "", bench: "", deadlift: "", ohp: "" }, templates: initial?.templates || [] });
  }

  return (
    <PaperCard className="p-4 mb-3">
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <div className="sm:col-span-2"><label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Block name</label><input value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Hypertrophy block 1" className="w-full px-2 py-1.5 text-sm" style={inputStyle()} /></div>
        <div><label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Weeks</label><input type="number" min={1} value={weeks} onChange={(e) => setWeeks(e.target.value)} className="w-full px-2 py-1.5 text-sm" style={inputStyle()} /></div>
        <div className="sm:col-span-3"><label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Phase</label><div className="flex gap-2">{["Volume", "Intensity", "Peak", "Deload"].map((p) => <button key={p} onClick={() => setPhase(p)} className="text-xs px-2.5 py-1" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, background: phase === p ? INK : "transparent", color: phase === p ? PAPER_BG : INK }}>{p}</button>)}</div></div>
      </div>
      <div className="flex gap-2 mt-3 justify-end">
        <button onClick={onCancel} className="text-sm px-3 py-1.5" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}>Cancel</button>
        <button onClick={submit} className="text-sm px-3 py-1.5" style={{ background: INK, color: PAPER_BG, borderRadius: 3 }}>Save</button>
      </div>
    </PaperCard>
  );
}

const PHASE_COLOR = { Volume: { bg: "#dce8e0", text: "#2d5240" }, Intensity: { bg: "#f0ddb8", text: "#7a5a10" }, Peak: { bg: "#f0c9c0", text: "#8a3324" }, Deload: { bg: "#d9e4ee", text: "#2d4a5a" } };

function BlockCard({ block, exercises, setExercises, expanded, onToggle, onUpdate, onRemove, onSaveTemplate, onArchiveToggle }) {
  const [showTemplateForm, setShowTemplateForm] = useState(false);
  const [editingTemplate, setEditingTemplate] = useState(null);
  const [showTMEdit, setShowTMEdit] = useState(false);
  const [showCycleInfo, setShowCycleInfo] = useState(false);
  const [renaming, setRenaming] = useState(false);
  const [nameInput, setNameInput] = useState(block.name);
  const [showExport, setShowExport] = useState(false);
  const [showNotes, setShowNotes] = useState(!!block.notes);

  function saveTemplate(t) {
    const exists = block.templates.some((x) => x.id === t.id);
    const templates = exists ? block.templates.map((x) => (x.id === t.id ? t : x)) : [...block.templates, t];
    onUpdate({ templates });
    setShowTemplateForm(false); setEditingTemplate(null);
  }
  function removeTemplate(id) { onUpdate({ templates: block.templates.filter((t) => t.id !== id) }); }
  function duplicateTemplate(t) {
    const copy = { ...t, id: uid(), name: `${t.name} (copy)`, exercises: t.exercises.map((e) => ({ ...e })) };
    const idx = block.templates.findIndex((x) => x.id === t.id);
    const newTemplates = [...block.templates];
    newTemplates.splice(idx + 1, 0, copy);
    onUpdate({ templates: newTemplates });
  }
  function moveTemplate(idx, dir) {
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= block.templates.length) return;
    const newTemplates = [...block.templates];
    [newTemplates[idx], newTemplates[newIdx]] = [newTemplates[newIdx], newTemplates[idx]];
    onUpdate({ templates: newTemplates });
  }
  function addBlankDay() { onUpdate({ templates: [...block.templates, { id: uid(), name: `Day ${block.templates.length + 1}`, exercises: [] }] }); }
  function commitRename() { if (nameInput.trim()) onUpdate({ name: nameInput.trim() }); setRenaming(false); }

  function exportText() {
    const lines = [];
    block.templates.forEach((t) => {
      lines.push(`${t.name}:`);
      t.exercises.forEach((te) => {
        const exo = exercises.find((e) => e.id === te.exerciseId);
        if (te.mode === "531") {
          lines.push(`${exo?.name || "Unknown"} 3x5 (5/3/1 vs ${TM_LIFTS.find((l) => l.key === te.tmLift)?.label} TM)`);
        } else {
          let line = `${exo?.name || "Unknown"} ${te.sets}x${te.repRange || "?"}`;
          if (te.targetRpe) line += ` @${te.targetRpe}`;
          if (te.targetWeight) line += ` ${te.targetWeight}lbs`;
          lines.push(line);
        }
      });
      lines.push("");
    });
    return lines.join("\n").trim();
  }

  const hasAny531 = block.templates.some((t) => t.exercises.some((e) => e.mode === "531"));
  const cycleInfo = hasAny531 ? cycleInfoForBlock(block, todayISO()) : null;
  const pc = PHASE_COLOR[block.phase] || { bg: "#eee", text: "#555" };

  return (
    <PaperCard>
      <div className="flex items-center justify-between px-3 py-2.5">
        <div className="flex items-center gap-2 flex-wrap flex-1 cursor-pointer" onClick={() => !renaming && onToggle()}>
          {expanded ? <ChevronDown size={15} style={{ color: INK_SOFT }} /> : <ChevronRight size={15} style={{ color: INK_SOFT }} />}
          {renaming ? (
            <input autoFocus value={nameInput} onChange={(e) => setNameInput(e.target.value)} onClick={(e) => e.stopPropagation()} onKeyDown={(e) => e.key === "Enter" && commitRename()} onBlur={commitRename} className="text-sm px-1 py-0.5 nb-script" style={{ ...inputStyle(), fontSize: "1.1rem" }} />
          ) : (
            <p className="text-sm font-medium nb-script" style={{ fontSize: "1.1rem" }}>{block.name}</p>
          )}
          <span className="text-[10px] px-1.5 py-0.5 rounded nb-script" style={{ background: pc.bg, color: pc.text }}>{block.phase}</span>
          <span className="text-xs" style={{ color: INK_SOFT }}>{block.weeks}wk</span>
          {block.archived && <span className="text-[10px] px-1.5 py-0.5 rounded nb-script" style={{ background: "#d9e4d9", color: "#3f6b3f" }}>Archived</span>}
          {hasAny531 && cycleInfo && <span className="text-[10px] px-1.5 py-0.5 rounded nb-script" style={{ background: "#e8c0d8", color: "#7a2d55" }}>5/3/1: cycle {cycleInfo.cycleNumber}, week {cycleInfo.cycleWeek}</span>}
        </div>
        <div className="flex gap-1">
          <button onClick={(e) => { e.stopPropagation(); setNameInput(block.name); setRenaming(true); }} className="icon-btn" style={{ color: INK_SOFT }} title="Rename"><Edit2 size={15} /></button>
          <button onClick={(e) => { e.stopPropagation(); onSaveTemplate(); }} className="icon-btn" style={{ color: INK_SOFT }} title="Save as reusable template"><Copy size={15} /></button>
          <button onClick={(e) => { e.stopPropagation(); onArchiveToggle(); }} className="icon-btn" style={{ color: block.archived ? "#3f6b3f" : INK_SOFT }} title={block.archived ? "Restore to active" : "Archive (mark complete)"}><Check size={15} /></button>
          <button onClick={(e) => { e.stopPropagation(); onRemove(); }} className="icon-btn" style={{ color: INK_SOFT }}><Trash2 size={15} /></button>
        </div>
      </div>

      {expanded && (
        <div className="px-3 py-3" style={{ borderTop: `1px solid ${INK}` }}>
          {block.progressionNote && <p className="text-xs rounded-md p-2 mb-3" style={{ color: INK_SOFT, background: "rgba(139,107,58,0.08)" }}>{block.progressionNote}</p>}

          <div className="flex gap-2 mb-3 flex-wrap">
            <button onClick={() => setShowNotes((s) => !s)} className="flex items-center gap-1 text-xs px-2 py-1" style={{ border: `1.5px solid ${INK_SOFT}`, borderRadius: 3, color: INK_SOFT }}><Edit2 size={11} /> {block.notes ? "Edit notes" : "Add notes"}</button>
            <button onClick={() => setShowExport((s) => !s)} className="flex items-center gap-1 text-xs px-2 py-1" style={{ border: `1.5px solid ${INK_SOFT}`, borderRadius: 3, color: INK_SOFT }}><Copy size={11} /> {showExport ? "Hide" : "Export"} as text</button>
          </div>

          {showNotes && <div className="mb-3"><textarea value={block.notes || ""} onChange={(e) => onUpdate({ notes: e.target.value })} placeholder="Tweaks, cues, things to remember for this program..." rows={3} className="w-full px-2 py-1.5 text-sm" style={inputStyle()} /></div>}

          {showExport && (
            <div className="mb-3 rounded-md p-2.5" style={{ background: "rgba(139,107,58,0.07)", border: "1px solid rgba(59,47,30,0.2)" }}>
              <p className="text-xs mb-1.5" style={{ color: INK_SOFT }}>Copy this and send it to anyone — they can paste it into "Custom program → Paste / describe a program" to rebuild it.</p>
              <textarea readOnly value={exportText()} rows={6} className="w-full px-2 py-1.5 text-xs" style={{ ...inputStyle(), fontFamily: "monospace" }} onClick={(e) => e.target.select()} />
            </div>
          )}

          {hasAny531 && (
            <div className="rounded-md p-2.5 mb-3" style={{ background: "#f1e3ec", border: "1px solid #d9b8cc" }}>
              <div className="flex items-center justify-between">
                <p className="text-xs" style={{ color: "#7a2d55" }}>Training maxes — Squat {block.trainingMaxes?.squat || "–"} · Bench {block.trainingMaxes?.bench || "–"} · Deadlift {block.trainingMaxes?.deadlift || "–"} · OHP {block.trainingMaxes?.ohp || "–"}</p>
                <button onClick={() => setShowTMEdit((s) => !s)} className="text-[11px] underline" style={{ color: "#7a2d55" }}>{showTMEdit ? "Close" : "Edit"}</button>
              </div>
              {showTMEdit && <TMEditForm block={block} onSave={(tms) => { onUpdate({ trainingMaxes: tms }); setShowTMEdit(false); }} />}
              <button onClick={() => setShowCycleInfo((s) => !s)} className="text-[11px] underline mt-1.5" style={{ color: "#7a2d55" }}>{showCycleInfo ? "Hide" : "View"} 4-week % breakdown</button>
              {showCycleInfo && <div className="mt-2 space-y-1">{FIVE31_WEEKS.map((w, i) => <p key={i} className="text-[11px]" style={{ color: "#7a2d55" }}><span className="font-medium">{w.label}:</span> {w.pcts.map((p, j) => `${p}%×${w.reps[j]}`).join(", ")}</p>)}</div>}
              <NewCyclePrompt block={block} onUpdate={onUpdate} />
            </div>
          )}

          <div className="flex items-center justify-between mb-2">
            <p className="text-xs" style={{ color: INK_SOFT }}>{block.templates.length} day templates</p>
            <button onClick={addBlankDay} className="flex items-center gap-1 text-xs px-2 py-1" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}><Plus size={12} /> Add blank day</button>
          </div>

          {showTemplateForm && <TemplateForm exercises={exercises} setExercises={setExercises} initial={editingTemplate} onSave={saveTemplate} onCancel={() => { setShowTemplateForm(false); setEditingTemplate(null); }} />}

          <div className="space-y-2 mt-2">
            {block.templates.map((t, idx) => {
              const restHours = muscleRestHoursToNextDay(block, exercises, idx);
              const warningMuscles = Object.entries(restHours).filter(([, h]) => h !== null && h < 48);
              return (
                <div key={t.id} className="rounded-md p-2.5" style={{ background: "rgba(139,107,58,0.06)", border: `1px solid rgba(59,47,30,0.2)` }}>
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-1.5"><p className="text-sm font-medium nb-script" style={{ fontSize: "1.05rem" }}>{t.name}</p><span className="text-[10px]" style={{ color: INK_SOFT }}>#{idx + 1}</span></div>
                    <div className="flex gap-0.5 flex-wrap">
                      <button onClick={() => moveTemplate(idx, -1)} disabled={idx === 0} className="icon-btn" style={{ color: INK_SOFT, opacity: idx === 0 ? 0.3 : 1 }} title="Move earlier"><ChevronLeft size={15} /></button>
                      <button onClick={() => moveTemplate(idx, 1)} disabled={idx === block.templates.length - 1} className="icon-btn" style={{ color: INK_SOFT, opacity: idx === block.templates.length - 1 ? 0.3 : 1 }} title="Move later"><ChevronRight size={15} /></button>
                      <button onClick={() => duplicateTemplate(t)} className="icon-btn" style={{ color: INK_SOFT }} title="Duplicate day"><Copy size={15} /></button>
                      <button onClick={() => { setEditingTemplate(t); setShowTemplateForm(true); }} className="icon-btn" style={{ color: INK_SOFT }}><Edit2 size={15} /></button>
                      <button onClick={() => removeTemplate(t.id)} className="icon-btn" style={{ color: INK_SOFT }}><Trash2 size={15} /></button>
                    </div>
                  </div>
                  {t.exercises.length === 0 ? (
                    <p className="text-xs mt-1" style={{ color: INK_SOFT }}>No exercises yet — click edit to build this day.</p>
                  ) : (
                    <>
                      <ul className="mt-1.5 space-y-0.5">
                        {t.exercises.map((te, i) => {
                          const exo = exercises.find((e) => e.id === te.exerciseId);
                          if (te.mode === "531") {
                            const resolved = resolve531Row(te, block, todayISO());
                            return <li key={i} className="text-xs" style={{ color: INK_SOFT }}><span style={{ color: "#7a2d55" }} className="font-medium">[5/3/1 {TM_LIFTS.find((l) => l.key === te.tmLift)?.label}]</span> {exo?.name || "Unknown"} — {resolved.weekLabel}: {resolved.sets.map((s) => `${s.weight ?? "?"}×${s.reps}`).join(", ")}</li>;
                          }
                          return <li key={i} className="text-xs" style={{ color: INK_SOFT }}>{exo?.name || "Unknown exercise"} — {te.sets}×{te.repRange}{te.targetRpe ? ` @RPE ${te.targetRpe}` : ""}{te.targetWeight ? ` (${te.targetWeight} lbs)` : ""}</li>;
                        })}
                      </ul>
                      {block.templates.length > 1 && (
                        <div className="mt-2 pt-2" style={{ borderTop: "1px dashed rgba(59,47,30,0.2)" }}>
                          <p className="text-[10px] mb-1" style={{ color: INK_SOFT }}>Rest before these muscles train again (next time in cycle):</p>
                          <div className="flex flex-wrap gap-1.5">
                            {Object.entries(restHours).map(([muscle, hours]) => (
                              <span key={muscle} className="text-[10px] px-1.5 py-0.5 rounded" style={{ background: hours !== null && hours < 48 ? "#f0c9c0" : "rgba(139,107,58,0.1)", color: hours !== null && hours < 48 ? "#8a3324" : INK_SOFT, fontWeight: hours !== null && hours < 48 ? 700 : 400 }}>{muscle}: {hours === null ? "no repeat in cycle" : `${hours}h`}</span>
                            ))}
                          </div>
                          {warningMuscles.length > 0 && <p className="text-[10px] mt-1.5 flex items-center gap-1" style={{ color: "#8a3324" }}><AlertTriangle size={11} /> {warningMuscles.map(([m]) => m).join(", ")} {warningMuscles.length === 1 ? "gets" : "get"} under 48h rest before training again.</p>}
                        </div>
                      )}
                    </>
                  )}
                </div>
              );
            })}
            {block.templates.length === 0 && !showTemplateForm && <p className="text-xs" style={{ color: INK_SOFT }}>No day templates yet.</p>}
          </div>
        </div>
      )}
    </PaperCard>
  );
}

function TMEditForm({ block, onSave }) {
  const [tms, setTms] = useState({ squat: block.trainingMaxes?.squat || "", bench: block.trainingMaxes?.bench || "", deadlift: block.trainingMaxes?.deadlift || "", ohp: block.trainingMaxes?.ohp || "" });
  return (
    <div className="mt-2 grid grid-cols-2 sm:grid-cols-4 gap-2">
      {TM_LIFTS.map((l) => <div key={l.key}><label className="text-[10px] block mb-0.5" style={{ color: "#7a2d55" }}>{l.label} TM</label><input type="number" value={tms[l.key]} onChange={(e) => setTms((p) => ({ ...p, [l.key]: e.target.value }))} className="w-full px-2 py-1 text-xs" style={{ border: "1px solid #d9b8cc", borderRadius: 3 }} /></div>)}
      <button onClick={() => onSave(tms)} className="col-span-2 sm:col-span-4 text-xs rounded-md py-1 mt-1" style={{ background: "#7a2d55", color: "#fff" }}>Save training maxes</button>
    </div>
  );
}

function NewCyclePrompt({ block, onUpdate }) {
  const { cycleNumber, cycleWeek } = cycleInfoForBlock(block, todayISO());
  const [dismissedCycle, setDismissedCycle] = useState(null);
  if (cycleNumber <= 1 || cycleWeek !== 1 || dismissedCycle === cycleNumber) return null;

  function applySuggested() {
    const tms = block.trainingMaxes || {};
    const next = {};
    TM_LIFTS.forEach((l) => {
      const cur = Number(tms[l.key]) || 0;
      next[l.key] = cur ? String(cur + (l.isLower ? 10 : 5)) : tms[l.key];
    });
    onUpdate({ trainingMaxes: next });
    setDismissedCycle(cycleNumber);
  }

  return (
    <div className="mt-2 rounded-md p-2" style={{ border: "1px solid #d9b8cc", background: "rgba(255,252,240,0.7)" }}>
      <p className="text-[11px] mb-1.5" style={{ color: "#7a2d55" }}>You've rolled into cycle {cycleNumber} — new training maxes? Convention is +5 lbs upper body lifts, +10 lbs lower body lifts.</p>
      <div className="flex gap-2">
        <button onClick={applySuggested} className="text-[11px] px-2 py-1 rounded-md" style={{ background: "#7a2d55", color: "#fff" }}>Apply suggested increase</button>
        <button onClick={() => setDismissedCycle(cycleNumber)} className="text-[11px] px-2 py-1 rounded-md" style={{ border: "1px solid #d9b8cc", color: "#7a2d55" }}>I'll set my own / keep as-is</button>
      </div>
    </div>
  );
}

function TemplateForm({ exercises, setExercises, initial, onSave, onCancel }) {
  const [name, setName] = useState(initial?.name || "");
  const [rows, setRows] = useState(initial?.exercises?.map((r) => ({ ...blankRow(exercises), ...r, key: uid() })) || []);

  function addRow() { setRows((r) => [...r, { ...blankRow(exercises), key: uid() }]); }
  function removeRow(key) { setRows((r) => r.filter((x) => x.key !== key)); }

    if (!name.trim()) return;
    onSave({ id: initial?.id || uid(), name: name.trim(), exercises: rows.map(({ key, ...rest }) => rest) });

    <PaperCard className="p-3 mb-2">

      <div className="space-y-2">

          <div key={row.key} className="rounded-md p-2" style={{ border: "1px solid rgba(59,47,30,0.2)" }}>
            <div className="flex flex-wrap items-end gap-2 mb-1.5">
              <div className="flex-1 min-w-[160px]"><label className="text-[10px] block mb-0.5" style={{ color: INK_SOFT }}>Exercise</label><ExerciseCombobox exercises={exercises} setExercises={setExercises} value={row.exerciseId} onChange={(id) => updateRow(row.key, { exerciseId: id })} /></div>
              <div className="w-32"><label className="text-[10px] block mb-0.5" style={{ color: INK_SOFT }}>Mode</label><select value={row.mode} onChange={(e) => updateRow(row.key, { mode: e.target.value })} className="w-full px-1.5 py-1 text-xs" style={inputStyle()}><option value="plain">Plain</option><option value="531">5/3/1 %TM</option></select></div>
              <button onClick={() => removeRow(row.key)} className="icon-btn" style={{ color: INK_SOFT }}><X size={15} /></button>
            </div>
            {row.mode === "531" ? (
              <div className="flex flex-wrap items-end gap-2">
                <div className="w-32"><label className="text-[10px] block mb-0.5" style={{ color: INK_SOFT }}>Training max ref</label><select value={row.tmLift} onChange={(e) => updateRow(row.key, { tmLift: e.target.value })} className="w-full px-1.5 py-1 text-xs" style={inputStyle()}>{TM_LIFTS.map((l) => <option key={l.key} value={l.key}>{l.label}</option>)}</select></div>
                <p className="text-[10px] flex-1" style={{ color: INK_SOFT }}>Sets/reps/weight auto-calculate from the block's training max and current 5/3/1 week.</p>
              </div>
            ) : (
              <div className="flex flex-wrap items-end gap-2">
                <div className="w-16"><label className="text-[10px] block mb-0.5" style={{ color: INK_SOFT }}>Sets</label><input type="number" min={1} value={row.sets} onChange={(e) => updateRow(row.key, { sets: Number(e.target.value) })} className="w-full px-1.5 py-1 text-xs" style={inputStyle()} /></div>
                <div className="w-20"><label className="text-[10px] block mb-0.5" style={{ color: INK_SOFT }}>Reps</label><input value={row.repRange} onChange={(e) => updateRow(row.key, { repRange: e.target.value })} placeholder="8-10" className="w-full px-1.5 py-1 text-xs" style={inputStyle()} /></div>
                <div className="w-20"><label className="text-[10px] block mb-0.5" style={{ color: INK_SOFT }}>RPE</label><input value={row.targetRpe} onChange={(e) => updateRow(row.key, { targetRpe: e.target.value })} placeholder="8" className="w-full px-1.5 py-1 text-xs" style={inputStyle()} /></div>
                <div className="w-24"><label className="text-[10px] block mb-0.5" style={{ color: INK_SOFT }}>Target weight</label><input value={row.targetWeight} onChange={(e) => updateRow(row.key, { targetWeight: e.target.value })} placeholder="185" className="w-full px-1.5 py-1 text-xs" style={inputStyle()} /></div>
