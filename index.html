      <div className="flex gap-2 mt-3 justify-end">
        <button onClick={onCancel} className="text-xs px-3 py-1.5" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}>Cancel</button>
        <button onClick={submit} className="text-xs px-3 py-1.5" style={{ background: INK, color: PAPER_BG, borderRadius: 3 }}>Save day</button>
      </div>
    </PaperCard>
  );
}

function templateForDate(schedule, blocks, dateISO) {
  if (!schedule || !schedule.blockId || !schedule.startDate) return null;
  const block = blocks.find((b) => b.id === schedule.blockId);
  if (!block || block.templates.length === 0) return null;
  if (dateISO < schedule.startDate) return null;
  const restSet = new Set(schedule.restWeekdays || []);
  const d = new Date(dateISO + "T00:00:00");
  if (restSet.has(d.getDay())) return null;
  let trainingIndex = -1;
  let cursor = new Date(schedule.startDate + "T00:00:00");
  const target = d.getTime();
  let count = 0, safety = 0;
  while (cursor.getTime() <= target && safety < 3000) {
    if (!restSet.has(cursor.getDay())) { if (cursor.getTime() === target) trainingIndex = count; count++; }
    cursor.setDate(cursor.getDate() + 1);
    safety++;
  }
  if (trainingIndex === -1) return null;
  return block.templates[trainingIndex % block.templates.length];
}

function CalendarTab({ blocks, logs, schedule, setSchedule }) {
  const [viewDate, setViewDate] = useState(new Date());
  const [showConfig, setShowConfig] = useState(!schedule);
  const block = schedule ? blocks.find((b) => b.id === schedule.blockId) : null;

  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  const startWeekday = firstOfMonth.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const logsByDate = {};
  logs.forEach((l) => { logsByDate[l.date] = (logsByDate[l.date] || 0) + 1; });

  function changeMonth(delta) { setViewDate(new Date(year, month + delta, 1)); }

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <p className="text-sm nb-script" style={{ color: INK_SOFT }}>{schedule && block ? `Following ${block.name}` : "No schedule set"}</p>
        <button onClick={() => setShowConfig((s) => !s)} className="flex items-center gap-1 text-sm px-3 py-1.5 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}><Edit2 size={13} /> {schedule ? "Edit schedule" : "Set up schedule"}</button>
      </div>
      {showConfig && <ScheduleConfigForm blocks={blocks} schedule={schedule} onSave={(s) => { setSchedule(s); setShowConfig(false); }} onClear={() => { setSchedule(null); setShowConfig(false); }} />}
      <div className="flex items-center justify-between mb-3">
        <button onClick={() => changeMonth(-1)} className="p-1.5" style={{ color: INK_SOFT }}><ChevronLeft size={16} /></button>
        <p className="text-sm font-medium nb-script" style={{ fontSize: "1.1rem" }}>{viewDate.toLocaleDateString(undefined, { month: "long", year: "numeric" })}</p>
        <button onClick={() => changeMonth(1)} className="p-1.5" style={{ color: INK_SOFT }}><ChevronRight size={16} /></button>
      </div>
      <div className="grid grid-cols-7 gap-1 mb-1">{WEEKDAYS.map((w) => <div key={w} className="text-[10px] sm:text-[11px] text-center py-1 nb-script" style={{ color: INK_SOFT }}>{w}</div>)}</div>
      <div className="grid grid-cols-7 gap-1">
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const dateISO = isoFromYMD(year, month, d);
          const tmpl = templateForDate(schedule, blocks, dateISO);
          const logged = logsByDate[dateISO];
          const isToday = dateISO === todayISO();
          return (
            <div key={i} className="rounded-md p-1 sm:p-1.5 min-h-[52px] sm:min-h-[64px] text-left overflow-hidden" style={{ border: `1.5px solid ${isToday ? ACCENT : "rgba(59,47,30,0.25)"}`, background: logged ? "#9bc49b" : "rgba(255,252,240,0.5)" }}>
              <div className="flex items-center justify-between">
                <span className={`text-[10px] sm:text-[11px] ${isToday ? "font-semibold" : ""}`} style={{ color: isToday ? ACCENT : logged ? "#1f3d1f" : INK_SOFT }}>{d}</span>
                {logged && <Check size={11} style={{ color: "#1f3d1f" }} />}
              </div>
              {tmpl && <p className="text-[9px] sm:text-[10px] mt-1 leading-tight truncate" style={{ color: logged ? "#1f3d1f" : INK_SOFT, fontWeight: logged ? 600 : 400 }}>{tmpl.name}</p>}
            </div>
          );
        })}
      </div>
      <div className="flex items-center gap-4 mt-3 text-[11px]" style={{ color: INK_SOFT }}>
        <span className="flex items-center gap-1.5"><span style={{ width: 12, height: 12, background: "#9bc49b", borderRadius: 2, display: "inline-block", border: "1px solid #1f3d1f" }} /> Workout logged</span>
        <span>Text below date = scheduled template</span>
      </div>
    </div>
  );
}

function ScheduleConfigForm({ blocks, schedule, onSave, onClear }) {
  const [blockId, setBlockId] = useState(schedule?.blockId || blocks[0]?.id || "");
  const [startDate, setStartDate] = useState(schedule?.startDate || todayISO());
  const [restWeekdays, setRestWeekdays] = useState(schedule?.restWeekdays || [0, 6]);

  function toggleRest(day) { setRestWeekdays((prev) => (prev.includes(day) ? prev.filter((d) => d !== day) : [...prev, day])); }
  function submit() { if (!blockId) return; onSave({ blockId, startDate, restWeekdays }); }

  const selectedBlock = blocks.find((b) => b.id === blockId);

  return (
    <PaperCard className="p-4 mb-4">
      {blocks.length === 0 ? (
        <p className="text-sm" style={{ color: INK_SOFT }}>Create a block with day templates in the Program tab first.</p>
      ) : (
        <>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
            <div><label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Block to follow</label><select value={blockId} onChange={(e) => setBlockId(e.target.value)} className="w-full px-2 py-1.5 text-sm" style={inputStyle()}>{blocks.map((b) => <option key={b.id} value={b.id} disabled={b.templates.length === 0}>{b.name} {b.templates.length === 0 ? "(no day templates)" : ""}</option>)}</select></div>
            <div><label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Start date</label><input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full px-2 py-1.5 text-sm" style={inputStyle()} /></div>
          </div>
          <div className="mb-3">
            <label className="text-xs block mb-1.5" style={{ color: INK_SOFT }}>Rest days (cycle skips these)</label>
            <div className="flex gap-1.5 flex-wrap">{WEEKDAYS.map((w, idx) => <button key={w} onClick={() => toggleRest(idx)} className="text-xs px-2.5 py-1" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, background: restWeekdays.includes(idx) ? INK : "transparent", color: restWeekdays.includes(idx) ? PAPER_BG : INK }}>{w}</button>)}</div>
          </div>
          {selectedBlock && selectedBlock.templates.length > 0 && <p className="text-xs mb-3" style={{ color: INK_SOFT }}>Cycle order: {selectedBlock.templates.map((t) => t.name).join(" → ")} → repeats</p>}
          <div className="flex gap-2 justify-end">
            {schedule && <button onClick={onClear} className="text-sm px-3 py-1.5" style={{ border: `1.5px solid ${ACCENT}`, borderRadius: 3, color: ACCENT }}>Clear schedule</button>}
            <button onClick={submit} className="text-sm px-3 py-1.5" style={{ background: INK, color: PAPER_BG, borderRadius: 3 }}>Save schedule</button>
          </div>
        </>
      )}
    </PaperCard>
  );
}

function LogTab({ exercises, setExercises, blocks, logs, setLogs, exerciseById, schedule, bodyweightLogs, setBodyweightLogs, unit }) {
  const [selectedBlockId, setSelectedBlockId] = useState(blocks[0]?.id || "");
  const [selectedTemplateId, setSelectedTemplateId] = useState("");
  const [date, setDate] = useState(todayISO());
  const [entries, setEntries] = useState({});
  const [freeEntries, setFreeEntries] = useState([]);
  const [savedMsg, setSavedMsg] = useState(false);
  const [editingLogId, setEditingLogId] = useState(null);
  const [bwInput, setBwInput] = useState("");
  const [bwSkippedToday, setBwSkippedToday] = useState(false);

  const block = blocks.find((b) => b.id === selectedBlockId);
  const template = block?.templates.find((t) => t.id === selectedTemplateId);
  const todaysBwEntry = bodyweightLogs.find((b) => b.date === date);
  const mostRecentBw = [...bodyweightLogs].sort((a, b) => (a.date < b.date ? 1 : -1))[0];

  useEffect(() => {
    if (schedule && schedule.blockId) {
      const tmpl = templateForDate(schedule, blocks, date);
      if (tmpl) { setSelectedBlockId(schedule.blockId); setSelectedTemplateId(tmpl.id); }
    }
  }, [date]);

  useEffect(() => {
    if (template) {
      const init = {};
      template.exercises.forEach((te, idx) => {
        const key = te.exerciseId + "__" + idx;
        if (te.mode === "531") {
          const resolved = resolve531Row(te, block, date);
          init[key] = resolved.sets.map((s) => ({ reps: "", weight: s.weight ?? "", rpe: "" }));
        } else {
          init[key] = Array.from({ length: te.sets }, () => ({ reps: "", weight: "", rpe: "" }));
        }
      });
      setEntries(init);
    } else { setEntries({}); }
    setFreeEntries([]);
  }, [selectedTemplateId, date]);

  function updateSet(key, idx, patch) {
    setEntries((prev) => { const sets = [...(prev[key] || [])]; sets[idx] = { ...sets[idx], ...patch }; return { ...prev, [key]: sets }; });
  }
  function removeSet(key, idx) {
    setEntries((prev) => { const sets = [...(prev[key] || [])]; sets.splice(idx, 1); return { ...prev, [key]: sets }; });
  }
  function copySet(key, idx) {
    setEntries((prev) => { const sets = [...(prev[key] || [])]; sets.splice(idx + 1, 0, { ...sets[idx] }); return { ...prev, [key]: sets }; });
  }
  function addSetToKey(key) { setEntries((prev) => ({ ...prev, [key]: [...(prev[key] || []), { reps: "", weight: "", rpe: "" }] })); }

  function addFreeExercise() { setFreeEntries((prev) => [...prev, { key: uid(), exerciseId: exercises[0]?.id || "", sets: [{ reps: "", weight: "", rpe: "" }] }]); }
  function updateFreeExercise(key, patch) { setFreeEntries((prev) => prev.map((f) => (f.key === key ? { ...f, ...patch } : f))); }
  function updateFreeSet(key, idx, patch) {
    setFreeEntries((prev) => prev.map((f) => { if (f.key !== key) return f; const sets = [...f.sets]; sets[idx] = { ...sets[idx], ...patch }; return { ...f, sets }; }));
  }
  function addFreeSet(key) { setFreeEntries((prev) => prev.map((f) => (f.key === key ? { ...f, sets: [...f.sets, { reps: "", weight: "", rpe: "" }] } : f))); }
  function removeFreeExercise(key) { setFreeEntries((prev) => prev.filter((f) => f.key !== key)); }
  function removeFreeSet(key, idx) {
    setFreeEntries((prev) => prev.map((f) => { if (f.key !== key) return f; const sets = [...f.sets]; sets.splice(idx, 1); return { ...f, sets }; }));
  }
  function copyFreeSet(key, idx) {
    setFreeEntries((prev) => prev.map((f) => { if (f.key !== key) return f; const sets = [...f.sets]; sets.splice(idx + 1, 0, { ...sets[idx] }); return { ...f, sets }; }));
  }

  function commitBodyweight() {
    if (bwInput && !isNaN(Number(bwInput))) {
      setBodyweightLogs((prev) => { const filtered = prev.filter((e) => e.date !== date); return [...filtered, { date, weight: Number(bwInput) }].sort((a, b) => (a.date < b.date ? -1 : 1)); });
    }
    setBwInput("");
  }

  function saveLog() {
    if (!todaysBwEntry && bwInput && !isNaN(Number(bwInput))) commitBodyweight();

    const allEntries = [];
    if (template) {
      template.exercises.forEach((te, idx) => {
        const key = te.exerciseId + "__" + idx;
        const sets = entries[key] || [];
        const cleanSets = sets.filter((s) => s.weight !== "" || s.reps !== "");
        if (cleanSets.length) allEntries.push({ exerciseId: te.exerciseId, sets: cleanSets.map((s) => ({ reps: Number(s.reps) || 0, weight: Number(s.weight) || 0, rpe: s.rpe === "" ? null : Number(s.rpe) })) });
      });
    }
    freeEntries.forEach((f) => {
      const cleanSets = f.sets.filter((s) => s.weight !== "" || s.reps !== "");
      if (cleanSets.length) allEntries.push({ exerciseId: f.exerciseId, sets: cleanSets.map((s) => ({ reps: Number(s.reps) || 0, weight: Number(s.weight) || 0, rpe: s.rpe === "" ? null : Number(s.rpe) })) });
    });
    if (allEntries.length === 0) return;

    if (editingLogId) {
      setLogs((prev) => prev.map((l) => (l.id === editingLogId ? { ...l, date, blockId: selectedBlockId || null, templateId: selectedTemplateId || null, templateName: template?.name || l.templateName, entries: allEntries } : l)));
      setEditingLogId(null);
    } else {
      setLogs((prev) => [...prev, { id: uid(), date, blockId: selectedBlockId || null, templateId: selectedTemplateId || null, templateName: template?.name || "Freeform session", entries: allEntries }]);
    }
    setSavedMsg(true);
    setTimeout(() => setSavedMsg(false), 2000);
    if (template) {
      const init = {};
      template.exercises.forEach((te, idx) => {
        const key = te.exerciseId + "__" + idx;
        if (te.mode === "531") { const resolved = resolve531Row(te, block, date); init[key] = resolved.sets.map((s) => ({ reps: "", weight: s.weight ?? "", rpe: "" })); }
        else { init[key] = Array.from({ length: te.sets }, () => ({ reps: "", weight: "", rpe: "" })); }
      });
      setEntries(init);
    }
    setFreeEntries([]);
  }

  function loadLogForEdit(log) {
    setEditingLogId(log.id);
    setDate(log.date);
    setSelectedBlockId(log.blockId || "");
    setSelectedTemplateId(log.templateId || "");
    const free = log.entries.map((e) => ({ key: uid(), exerciseId: e.exerciseId, sets: e.sets.map((s) => ({ reps: String(s.reps), weight: String(s.weight), rpe: s.rpe == null ? "" : String(s.rpe) })) }));
    setFreeEntries(free);
    setEntries({});
  }
  function cancelEdit() { setEditingLogId(null); setFreeEntries([]); }
  function deleteLog(id) { setLogs((prev) => prev.filter((l) => l.id !== id)); if (editingLogId === id) cancelEdit(); }

  const notebookInput = { border: "none", borderBottom: `2px solid ${INK_SOFT}`, background: "transparent", color: ACCENT, fontWeight: 700 };

  return (
    <div>
      <div className="rounded-sm p-4 sm:p-6" style={{ background: "repeating-linear-gradient(white 0px, white 27px, #cdd9e0 28px, white 29px)", border: `1.5px solid ${INK}`, boxShadow: "3px 4px 0 rgba(59,47,30,0.18)", position: "relative" }}>
        <div style={{ position: "absolute", top: 0, bottom: 0, left: 28, width: 1.5, background: "#d98a8a" }} />
        <div className="pl-6">
          <MobileSyncImport exercises={exercises} setExercises={setExercises} logs={logs} setLogs={setLogs} />
          <div className="flex items-center justify-between">
            <p className="nb-header text-lg mb-3" style={{ color: INK }}>{editingLogId ? "Editing a past session" : "Today's session"}</p>
            {editingLogId && <button onClick={cancelEdit} className="text-xs px-2 py-1 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}>Cancel edit</button>}
          </div>

          {!editingLogId && !todaysBwEntry && !bwSkippedToday && (
            <div className="flex items-center gap-2 mb-4 flex-wrap rounded-md p-2" style={{ background: "rgba(139,107,58,0.07)", border: "1px dashed rgba(59,47,30,0.25)" }}>
              <span className="text-xs nb-script" style={{ color: INK_SOFT }}>Bodyweight today?</span>
              <input type="number" value={bwInput} onChange={(e) => setBwInput(e.target.value)} placeholder={mostRecentBw ? String(mostRecentBw.weight) : "—"} className="w-16 px-1.5 py-1 text-sm text-center" style={notebookInput} />
              <span className="text-xs" style={{ color: INK_SOFT }}>{unit}</span>
              <button onClick={commitBodyweight} className="text-xs px-2 py-1" style={{ background: INK, color: PAPER_BG, borderRadius: 3 }}>Save</button>
              <button onClick={() => setBwSkippedToday(true)} className="text-xs px-2 py-1" style={{ color: INK_SOFT }}>Skip</button>
            </div>
          )}
          {!editingLogId && todaysBwEntry && <p className="text-xs mb-3 nb-script" style={{ color: "#2d5240" }}>✓ Bodyweight logged today: {todaysBwEntry.weight} {unit}</p>}

          <div className="flex flex-wrap gap-3 mb-4">
            <div><label className="text-xs block mb-0.5" style={{ color: INK_SOFT }}>Date</label><input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="px-2 py-1 text-sm" style={notebookInput} /></div>
            <div><label className="text-xs block mb-0.5" style={{ color: INK_SOFT }}>Block</label><select value={selectedBlockId} onChange={(e) => { setSelectedBlockId(e.target.value); setSelectedTemplateId(""); }} className="px-2 py-1 text-sm" style={{ ...notebookInput, color: INK }}><option value="">Freeform (no block)</option>{blocks.map((b) => <option key={b.id} value={b.id}>{b.name}</option>)}</select></div>
            {block && <div><label className="text-xs block mb-0.5" style={{ color: INK_SOFT }}>Day template</label><select value={selectedTemplateId} onChange={(e) => setSelectedTemplateId(e.target.value)} className="px-2 py-1 text-sm" style={{ ...notebookInput, color: INK }}><option value="">Select a day</option>{block.templates.map((t) => <option key={t.id} value={t.id}>{t.name}</option>)}</select></div>}
          </div>

          {!editingLogId && schedule && templateForDate(schedule, blocks, date) && selectedTemplateId === templateForDate(schedule, blocks, date)?.id && <p className="text-xs mb-3 nb-script" style={{ color: "#2d5240" }}>✓ Auto-filled from your schedule for this date.</p>}
          {!editingLogId && block && block.templates.some((t) => t.exercises.some((e) => e.mode === "531")) && <p className="text-xs mb-3 nb-script" style={{ color: "#7a2d55" }}>5/3/1 cycle {cycleInfoForBlock(block, date).cycleNumber}, week {cycleInfoForBlock(block, date).cycleWeek} — weights pre-filled from training max.</p>}

          {!editingLogId && template && (
            <div className="space-y-4 mb-4">
              {template.exercises.length === 0 && <p className="text-xs" style={{ color: INK_SOFT }}>This day has no exercises yet — add them in the Program tab.</p>}
              {template.exercises.map((te, idx) => {
                const exo = exerciseById(te.exerciseId);
                const key = te.exerciseId + "__" + idx;
                const sets = entries[key] || [];
                const is531 = te.mode === "531";
                const resolved = is531 ? resolve531Row(te, block, date) : null;
                const last = lastSessionFor(logs, te.exerciseId, date);
                return (
                  <div key={key} className="pb-3" style={{ borderBottom: `1px dashed rgba(59,47,30,0.3)` }}>
                    <div className="flex items-center justify-between flex-wrap gap-1">
                      <p className="text-base font-medium nb-script" style={{ color: INK }}>{exo?.name || "Unknown"}{is531 && <span className="text-[11px] ml-1.5" style={{ color: "#7a2d55" }}>[5/3/1 {TM_LIFTS.find((l) => l.key === te.tmLift)?.label}]</span>}</p>
                      {last && <p className="text-xs nb-script italic" style={{ color: INK_SOFT }}>Last time ({fmtDate(last.date)}): {last.sets.map((s) => `${s.weight}×${s.reps}${s.rpe ? `@${s.rpe}` : ""}`).join(", ")}</p>}
                    </div>
                    <p className="text-xs mb-2" style={{ color: INK_SOFT }}>{is531 ? `${resolved.weekLabel}: ${resolved.sets.map((s) => `${s.weight ?? "?"} lbs ×${s.reps}`).join(", ")}` : `Target: ${te.sets}×${te.repRange}${te.targetRpe ? ` @RPE ${te.targetRpe}` : ""}${te.targetWeight ? ` (${te.targetWeight} lbs)` : ""}`}</p>
                    <div className="space-y-2">
                      {sets.map((s, sidx) => {
                        const lastSet = last?.sets?.[sidx];
                        return (
                          <div key={sidx} className="set-row flex items-center gap-1.5 flex-wrap rounded-md p-1.5" style={{ background: "rgba(139,107,58,0.05)" }}>
                            <span className="text-xs w-9" style={{ color: INK_SOFT }}>Set {sidx + 1}</span>
                            <input type="number" placeholder="lbs" value={s.weight} onChange={(e) => updateSet(key, sidx, { weight: e.target.value })} className="w-16 px-1 py-1.5 text-base text-center" style={notebookInput} />
                            <span style={{ color: INK_SOFT }}>×</span>
                            <input type="number" placeholder="reps" value={s.reps} onChange={(e) => updateSet(key, sidx, { reps: e.target.value })} className="w-14 px-1 py-1.5 text-base text-center" style={notebookInput} />
                            <span className="text-xs" style={{ color: INK_SOFT }}>@</span>
                            <input type="number" placeholder="RPE" step="0.5" value={s.rpe} onChange={(e) => updateSet(key, sidx, { rpe: e.target.value })} className="w-12 px-1 py-1.5 text-base text-center" style={notebookInput} />
                            <button onClick={() => copySet(key, sidx)} className="icon-btn" style={{ color: INK_SOFT }} title="Copy this set"><Copy size={15} /></button>
                            <button onClick={() => removeSet(key, sidx)} className="icon-btn" style={{ color: INK_SOFT }} title="Remove this set"><X size={15} /></button>
                            {lastSet && <span className="text-[11px] nb-script italic w-full sm:w-auto" style={{ color: "#8a8270" }}>(was {lastSet.weight}×{lastSet.reps})</span>}
                            {is531 && <span className="text-[10px]" style={{ color: INK_SOFT }}>{resolved.sets[sidx]?.reps} target reps</span>}
                          </div>
                        );
                      })}
                      <button onClick={() => addSetToKey(key)} className="flex items-center gap-1 text-xs py-1" style={{ color: INK_SOFT }}><Plus size={13} /> Add set</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <div className="rounded-sm p-3 mb-4" style={{ border: `1.5px dashed ${INK_SOFT}` }}>
            <div className="flex items-center justify-between mb-2">
              <p className="text-sm font-medium nb-script" style={{ color: INK }}>{editingLogId ? "Logged exercises" : "+ Quick-add exercise"}</p>
              <button onClick={addFreeExercise} className="flex items-center gap-1 text-xs px-2 py-1" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}><Plus size={12} /> Add</button>
            </div>
            <div className="space-y-3">
              {freeEntries.map((f) => {
                const last = lastSessionFor(logs, f.exerciseId, date);
                return (
                  <div key={f.key} className="rounded-md p-2" style={{ border: "1px solid rgba(59,47,30,0.2)" }}>
                    <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                      <div className="flex-1 min-w-[160px]"><ExerciseCombobox exercises={exercises} setExercises={setExercises} value={f.exerciseId} onChange={(id) => updateFreeExercise(f.key, { exerciseId: id })} /></div>
                      <button onClick={() => removeFreeExercise(f.key)} className="icon-btn" style={{ color: INK_SOFT }}><X size={15} /></button>
                    </div>
                    {last && <p className="text-xs mb-1 nb-script italic" style={{ color: INK_SOFT }}>Last time ({fmtDate(last.date)}): {last.sets.map((s) => `${s.weight}×${s.reps}${s.rpe ? `@${s.rpe}` : ""}`).join(", ")}</p>}
                    <div className="space-y-2">
                      {f.sets.map((s, idx) => (
                        <div key={idx} className="set-row flex items-center gap-1.5 flex-wrap rounded-md p-1.5" style={{ background: "rgba(139,107,58,0.05)" }}>
                          <span className="text-xs w-9" style={{ color: INK_SOFT }}>Set {idx + 1}</span>
                          <input type="number" placeholder="lbs" value={s.weight} onChange={(e) => updateFreeSet(f.key, idx, { weight: e.target.value })} className="w-16 px-1 py-1.5 text-base text-center" style={notebookInput} />
                          <span style={{ color: INK_SOFT }}>×</span>
                          <input type="number" placeholder="reps" value={s.reps} onChange={(e) => updateFreeSet(f.key, idx, { reps: e.target.value })} className="w-14 px-1 py-1.5 text-base text-center" style={notebookInput} />
                          <span className="text-xs" style={{ color: INK_SOFT }}>@</span>
                          <input type="number" placeholder="RPE" step="0.5" value={s.rpe} onChange={(e) => updateFreeSet(f.key, idx, { rpe: e.target.value })} className="w-12 px-1 py-1.5 text-base text-center" style={notebookInput} />
                          <button onClick={() => copyFreeSet(f.key, idx)} className="icon-btn" style={{ color: INK_SOFT }} title="Copy this set"><Copy size={15} /></button>
                          <button onClick={() => removeFreeSet(f.key, idx)} className="icon-btn" style={{ color: INK_SOFT }} title="Remove this set"><X size={15} /></button>
                        </div>
                      ))}
                    </div>
                    <button onClick={() => addFreeSet(f.key)} className="flex items-center gap-1 text-[11px] mt-1.5" style={{ color: INK_SOFT }}><Plus size={11} /> Add set</button>
                  </div>
                );
              })}
              {freeEntries.length === 0 && <p className="text-xs" style={{ color: INK_SOFT }}>Add any exercise not on today's template.</p>}
            </div>
          </div>

          <div className="flex items-center gap-3">
            <button onClick={saveLog} className="flex items-center gap-1.5 text-sm px-4 py-2 nb-script" style={{ background: ACCENT, color: "#fff8ec", borderRadius: 3 }}><Check size={15} /> {editingLogId ? "Update workout" : "Save workout"}</button>
            {savedMsg && <span className="text-sm nb-script" style={{ color: "#2d5240" }}>{editingLogId ? "Updated!" : "Logged! Keep grinding."}</span>}
          </div>
        </div>
      </div>

      {logs.length > 0 && (
        <div className="mt-6">
          <p className="text-sm font-medium mb-2 nb-header" style={{ color: INK }}>Recent pages</p>
          <div className="space-y-2">
            {[...logs].sort((a, b) => (a.date < b.date ? 1 : -1)).slice(0, 8).map((log) => (
              <PaperCard key={log.id} className="p-2.5 text-xs">
                <div className="flex justify-between items-center">
                  <span className="font-medium nb-script" style={{ fontSize: "1rem" }}>{fmtDate(log.date)} — {log.templateName}</span>
                  <div className="flex items-center gap-2">
                    <span style={{ color: INK_SOFT }}>{log.entries.length} exercises</span>
                    <button onClick={() => loadLogForEdit(log)} className="icon-btn" style={{ color: INK_SOFT }} title="Edit"><Edit2 size={15} /></button>
                    <button onClick={() => deleteLog(log.id)} className="icon-btn" style={{ color: INK_SOFT }} title="Delete"><Trash2 size={15} /></button>
                  </div>
                </div>
              </PaperCard>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const CHART_COLORS = ["#8a3324", "#2d5240", "#2d4a5a", "#7a5a10", "#7a2d55", "#3d6b6b", "#9a5a1a", "#4a3d7a"];
const TOTAL_COLOR = "#3b2f1e";

function ProgressTab({ exercises, logs, blocks, schedule, exerciseById, bodyweightLogs, setBodyweightLogs, progressSettings, setProgressSettings }) {
  const mainLifts = exercises.filter((e) => e.isMain);
  const trackableExercises = exercises;
  const selectedTarget = progressSettings.selectedTarget || mainLifts[0]?.id || trackableExercises[0]?.id || null;

  function setSelectedTarget(id) { setProgressSettings((prev) => ({ ...prev, selectedTarget: id })); }
  function setBodyweightShown(v) { setProgressSettings((prev) => ({ ...prev, bodyweightShown: v })); }
  function setDetailShown(v) { setProgressSettings((prev) => ({ ...prev, detailShown: v })); }

  function historyFor(exerciseId) {
    const points = [];
    [...logs].sort((a, b) => (a.date > b.date ? 1 : -1)).forEach((log) => {
      const entry = log.entries.find((e) => e.exerciseId === exerciseId);
      if (!entry) return;
      let best1rm = 0, bestSet = null;
      entry.sets.forEach((s) => { const e1 = est1RM(s.weight, s.reps); if (e1 > best1rm) { best1rm = e1; bestSet = s; } });
      if (bestSet) points.push({ date: log.date, est1rm: round(best1rm, 1), weight: bestSet.weight, reps: bestSet.reps });
    });
    const exo = exerciseById(exerciseId);
    if (exo && exo.realOneRM != null && exo.realOneRM !== "" && !isNaN(Number(exo.realOneRM))) {
      points.push({ date: todayISO(), est1rm: Number(exo.realOneRM), isReal: true });
    }
    return points;
  }

  function totalHistory() {
    const points = [];
    [...logs].sort((a, b) => (a.date > b.date ? 1 : -1)).forEach((log) => {
      let sum = 0;
      log.entries.forEach((entry) => {
        let best1rm = 0;
        entry.sets.forEach((s) => { const e1 = est1RM(s.weight, s.reps); if (e1 > best1rm) best1rm = e1; });
        sum += best1rm;
      });
      points.push({ date: log.date, est1rm: round(sum, 1) });
    });
    return points;
  }

  function volumeByMuscle() {
    const weekly = {};
    logs.forEach((log) => {
      const d = new Date(log.date + "T00:00:00");
      const week = `${d.getFullYear()}-W${String(getWeekNum(d)).padStart(2, "0")}`;
      log.entries.forEach((entry) => {
        const exo = exerciseById(entry.exerciseId);
        if (!exo) return;
        const tonnage = entry.sets.reduce((sum, s) => sum + s.weight * s.reps, 0);
        weekly[week] = weekly[week] || {};
        weekly[week][exo.muscle] = (weekly[week][exo.muscle] || 0) + tonnage;
      });
    });
    return weekly;
  }
  function getWeekNum(d) { const onejan = new Date(d.getFullYear(), 0, 1); return Math.ceil(((d - onejan) / 86400000 + onejan.getDay() + 1) / 7); }

  function computeDeloadSignals() {
    const signals = [];
    mainLifts.forEach((exo) => {
      const hist = historyFor(exo.id);
      if (hist.length >= 3) {
        const lastThree = hist.slice(-3);
        const trend = lastThree[2].est1rm - lastThree[0].est1rm;
        if (trend <= 0) signals.push({ text: `${exo.name}'s estimated 1RM hasn't progressed over your last 3 logged sessions (${round(lastThree[0].est1rm)} → ${round(lastThree[2].est1rm)} lbs).` });
      }
    });
    const sessionsWithRpe = [...logs].sort((a, b) => (a.date > b.date ? 1 : -1)).map((log) => {
      const rpes = [];
      log.entries.forEach((e) => e.sets.forEach((s) => { if (s.rpe != null) rpes.push(s.rpe); }));
      if (rpes.length === 0) return null;
      return { date: log.date, avgRpe: rpes.reduce((a, b) => a + b, 0) / rpes.length };
    }).filter(Boolean);
    if (sessionsWithRpe.length >= 3) {
      const lastThree = sessionsWithRpe.slice(-3);
      const avg = lastThree.reduce((a, b) => a + b.avgRpe, 0) / lastThree.length;
      if (avg >= 8.5) signals.push({ text: `Average RPE across your last 3 logged sessions is ${round(avg, 1)} — consistently high effort with little room before failure.` });
    }
    if (schedule && schedule.blockId) {
      const block = blocks.find((b) => b.id === schedule.blockId);
      if (block && block.weeks) {
        const elapsedDays = daysBetween(schedule.startDate, todayISO());
        const elapsedWeeks = Math.floor(elapsedDays / 7) + 1;
        if (elapsedWeeks >= block.weeks && block.phase !== "Deload") signals.push({ text: `You're in week ${elapsedWeeks} of the ${block.weeks}-week "${block.name}" block — this is typically when a deload week is scheduled before the next block.` });
      }
    }
    return signals;
  }

  const deloadSignals = computeDeloadSignals();
  const isTotal = selectedTarget === "__total__";
  const history = isTotal ? totalHistory() : (selectedTarget ? historyFor(selectedTarget) : []);
  const lastTwo = history.slice(-2);
  let suggestion = null;
  if (lastTwo.length === 2) {
    const prev = lastTwo[0], curr = lastTwo[1];
    suggestion = curr.est1rm >= prev.est1rm ? `Last session's value (${round(curr.est1rm)} lbs) held or improved on the one before. Consider adding a little weight next session.` : `Last session dipped slightly vs the one before. Consider repeating the same weight before progressing.`;
  }

  const weeklyVolume = volumeByMuscle();
  const weekKeys = Object.keys(weeklyVolume).sort();
  const recentWeeks = weekKeys.slice(-6);
  const allMuscles = Array.from(new Set(recentWeeks.flatMap((w) => Object.keys(weeklyVolume[w] || {}))));

  const totalTonnageByDate = {};
  logs.forEach((log) => {
    const tonnage = log.entries.reduce((sum, entry) => sum + entry.sets.reduce((s2, s) => s2 + s.weight * s.reps, 0), 0);
    totalTonnageByDate[log.date] = (totalTonnageByDate[log.date] || 0) + tonnage;
  });
  const tonnageDates = Object.keys(totalTonnageByDate).sort();

  if (logs.length === 0 && bodyweightLogs.length === 0) return <p className="text-sm" style={{ color: INK_SOFT }}>Log some workouts to see progress trends here.</p>;

  return (
    <div className="space-y-6">
      {deloadSignals.length > 0 && (
        <PaperCard className="p-3" style={{ background: "#f3e4cc" }}>
          <div className="flex items-center gap-2 mb-2"><AlertTriangle size={15} style={{ color: "#9a6a1a" }} /><p className="text-sm font-medium nb-script" style={{ color: "#7a5a10", fontSize: "1.05rem" }}>Deload may be worth considering</p></div>
          <ul className="space-y-1.5">{deloadSignals.map((s, i) => <li key={i} className="text-xs leading-relaxed" style={{ color: "#7a5a10" }}>• {s.text}</li>)}</ul>
          <p className="text-[11px] mt-2" style={{ color: "#9a7a30" }}>These are pattern-based observations from your logged data, not a substitute for how you actually feel. Use your judgment.</p>
        </PaperCard>
      )}

      {logs.length > 0 && (
        <div>
          <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
            <p className="text-sm font-medium nb-header" style={{ color: INK }}>Estimated 1RM</p>
            <select value={selectedTarget || ""} onChange={(e) => setSelectedTarget(e.target.value)} className="px-2 py-1.5 text-sm" style={inputStyle()}>
              <option value="__total__">Total (all logged lifts)</option>
              {trackableExercises.map((exo) => <option key={exo.id} value={exo.id}>{exo.name}</option>)}
            </select>
          </div>
          {history.length === 0 && <p className="text-xs" style={{ color: INK_SOFT }}>No logged sets yet for this selection.</p>}
          {history.length > 0 && (
            <>
              <div className="grid grid-cols-3 gap-2 mb-3">
                <MetricCard label="Sessions logged" value={history.length} />
                <MetricCard label="Best value" value={`${round(Math.max(...history.map((h) => h.est1rm)))} lbs`} />
                <MetricCard label="Latest value" value={`${round(history[history.length - 1].est1rm)} lbs${history[history.length - 1].isReal ? " (real)" : ""}`} />
              </div>
              <SimpleLineChart points={history.map((h) => ({ x: fmtDate(h.date), y: h.est1rm }))} showTrend={true} height={300} />
              {suggestion && <div className="mt-3 rounded-md p-2.5 text-xs" style={{ background: "#dce8f0", color: "#2d4a5a", border: "1px solid #b8cce0" }}>{suggestion}</div>}
            </>
          )}
        </div>
      )}

      <BodyweightTracker bodyweightLogs={bodyweightLogs} setBodyweightLogs={setBodyweightLogs} shown={progressSettings.bodyweightShown} setShown={setBodyweightShown} />

      {logs.length > 0 && (
        <div>
          <button onClick={() => setDetailShown(!progressSettings.detailShown)} className="flex items-center gap-1 text-xs px-2 py-1 nb-script" style={{ border: `1.5px solid ${INK_SOFT}`, borderRadius: 3, color: INK_SOFT }}>
            {progressSettings.detailShown ? <ChevronDown size={13} /> : <ChevronRight size={13} />} Additional detail (tonnage &amp; muscle volume)
          </button>
          {progressSettings.detailShown && (
            <div className="mt-3 space-y-6">
              <div><p className="text-sm font-medium mb-3 nb-header" style={{ color: INK }}>Total tonnage per session</p><SimpleLineChart points={tonnageDates.map((d) => ({ x: fmtDate(d), y: round(totalTonnageByDate[d]) }))} /></div>
              <div>
                <p className="text-sm font-medium mb-3 nb-header" style={{ color: INK }}>Weekly volume by muscle group</p>
                {allMuscles.length === 0 ? <p className="text-xs" style={{ color: INK_SOFT }}>Not enough data yet.</p> : (
                  <div className="overflow-x-auto">
                    <table className="text-xs w-full border-collapse">
                      <thead><tr><th className="text-left font-normal pb-1" style={{ color: INK_SOFT }}>Week</th>{allMuscles.map((m) => <th key={m} className="text-right font-normal pb-1 px-2" style={{ color: INK_SOFT }}>{m}</th>)}</tr></thead>
                      <tbody>{recentWeeks.map((w) => <tr key={w} style={{ borderTop: "1px solid rgba(59,47,30,0.15)" }}><td className="py-1" style={{ color: INK }}>{w}</td>{allMuscles.map((m) => <td key={m} className="text-right py-1 px-2" style={{ color: INK }}>{weeklyVolume[w][m] ? round(weeklyVolume[w][m]).toLocaleString() : "–"}</td>)}</tr>)}</tbody>
                    </table>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function BodyweightTracker({ bodyweightLogs, setBodyweightLogs, shown, setShown }) {
  const [date, setDate] = useState(todayISO());
  const [weight, setWeight] = useState("");

  function addEntry() {
    if (!weight || isNaN(Number(weight))) return;
    setBodyweightLogs((prev) => { const filtered = prev.filter((e) => e.date !== date); return [...filtered, { date, weight: Number(weight) }].sort((a, b) => (a.date < b.date ? -1 : 1)); });
    setWeight("");
  }
  function removeEntry(d) { setBodyweightLogs((prev) => prev.filter((e) => e.date !== d)); }

  const sorted = [...bodyweightLogs].sort((a, b) => (a.date < b.date ? -1 : 1));

  if (!shown) return <div><button onClick={() => setShown(true)} className="text-sm px-3 py-1.5 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}>+ Track bodyweight (optional)</button></div>;

  return (
    <div>
      <div className="flex items-center justify-between mb-3"><p className="text-sm font-medium nb-header" style={{ color: INK }}>Bodyweight</p><button onClick={() => setShown(false)} className="text-xs px-2 py-1" style={{ border: `1.5px solid ${INK_SOFT}`, borderRadius: 3, color: INK_SOFT }}>Hide</button></div>
      <div className="flex flex-wrap gap-2 items-end mb-3">
        <div><label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Date</label><input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="px-2 py-1.5 text-sm" style={inputStyle()} /></div>
        <div><label className="text-xs block mb-1" style={{ color: INK_SOFT }}>Weight</label><input type="number" value={weight} onChange={(e) => setWeight(e.target.value)} placeholder="180" className="px-2 py-1.5 text-sm w-24" style={inputStyle()} /></div>
        <button onClick={addEntry} className="text-sm px-3 py-1.5 nb-script" style={{ background: INK, color: PAPER_BG, borderRadius: 3 }}>Log entry</button>
      </div>
      {sorted.length === 0 ? <p className="text-xs" style={{ color: INK_SOFT }}>No bodyweight entries yet.</p> : (
        <>
          <BodyweightChart entries={sorted} />
          <div className="mt-3 max-h-40 overflow-y-auto space-y-1">{[...sorted].reverse().map((e) => <div key={e.date} className="flex items-center justify-between text-xs px-1"><span style={{ color: INK }}>{fmtDate(e.date)} — {e.weight}</span><button onClick={() => removeEntry(e.date)} className="p-0.5" style={{ color: INK_SOFT }}><X size={12} /></button></div>)}</div>
        </>
      )}
    </div>
  );
}

function BodyweightChart({ entries }) {
  const width = 700, height = 200, padding = 36, threshold = 0.3;
  const weights = entries.map((e) => e.weight);
  const minY = Math.min(...weights) - 2;
  const maxY = Math.max(...weights) + 2;
  const range = maxY - minY || 1;
  const stepX = entries.length > 1 ? (width - padding * 2) / (entries.length - 1) : 0;
  function yFor(val) { return height - padding - ((val - minY) / range) * (height - padding * 2); }
  function xFor(i) { return padding + i * stepX; }
  function colorFor(idx) {
    if (idx === 0) return INK_SOFT;
    const diff = entries[idx].weight - entries[idx - 1].weight;
    if (diff > threshold) return "#8a3324";
    if (diff < -threshold) return "#2d5240";
    return "#9a8a6a";
  }
  const coords = entries.map((e, i) => ({ x: xFor(i), y: yFor(e.weight), weight: e.weight, date: e.date }));

  return (
    <div>
      <svg viewBox={`0 0 ${width} ${height}`} className="w-full" style={{ maxHeight: 230 }}>
        <line x1={padding} y1={height - padding} x2={width - padding} y2={height - padding} stroke={INK_SOFT} strokeWidth="1" />
        {coords.slice(1).map((c, i) => { const prev = coords[i]; return <line key={i} x1={prev.x} y1={prev.y} x2={c.x} y2={c.y} stroke={colorFor(i + 1)} strokeWidth="2.5" />; })}
        {coords.map((c, i) => (
          <g key={i}>
            <circle cx={c.x} cy={c.y} r="4" fill={colorFor(i)} />
            <text x={c.x} y={c.y - 8} fontSize="9" fill={INK} textAnchor="middle" fontWeight="600">{c.weight}</text>
            {(i % Math.ceil(entries.length / 10 || 1) === 0) && <text x={c.x} y={height - padding + 14} fontSize="8.5" fill={INK_SOFT} textAnchor="middle">{fmtDate(c.date)}</text>}
          </g>
        ))}
      </svg>
      <div className="flex flex-wrap gap-3 mt-2">
        <span className="flex items-center gap-1.5 text-xs" style={{ color: INK_SOFT }}><span style={{ width: 14, height: 2.5, background: "#8a3324", display: "inline-block" }} /> Up vs last entry</span>
        <span className="flex items-center gap-1.5 text-xs" style={{ color: INK_SOFT }}><span style={{ width: 14, height: 2.5, background: "#2d5240", display: "inline-block" }} /> Down vs last entry</span>
        <span className="flex items-center gap-1.5 text-xs" style={{ color: INK_SOFT }}><span style={{ width: 14, height: 2.5, background: "#9a8a6a", display: "inline-block" }} /> Roughly flat</span>
      </div>
    </div>
  );
}

function MetricCard({ label, value }) {
  return <PaperCard className="p-3"><p className="text-[11px]" style={{ color: INK_SOFT }}>{label}</p><p className="text-lg font-medium mt-0.5 nb-script" style={{ color: INK }}>{value}</p></PaperCard>;
}

function movingAverage(values, window) {
  return values.map((_, i) => { const start = Math.max(0, i - window + 1); const slice = values.slice(start, i + 1); return slice.reduce((a, b) => a + b, 0) / slice.length; });
}

function SimpleLineChart({ points, showTrend = false, height = 200 }) {
  if (points.length === 0) return <p className="text-xs" style={{ color: INK_SOFT }}>No data yet.</p>;
  const width = 680, padding = 44;
  const ys = points.map((p) => p.y);
  const minY = Math.min(...ys) * 0.93;
  const maxY = Math.max(...ys) * 1.07;
  const range = maxY - minY || 1;
  const stepX = points.length > 1 ? (width - padding * 2) / (points.length - 1) : 0;
  const coords = points.map((p, i) => ({ x: padding + i * stepX, y: height - padding - ((p.y - minY) / range) * (height - padding * 2), label: p.x, value: p.y }));
  const pathD = coords.map((c, i) => `${i === 0 ? "M" : "L"} ${c.x} ${c.y}`).join(" ");

  const trendValues = showTrend && points.length >= 3 ? movingAverage(points.map((p) => p.y), 3) : null;
  const trendCoords = trendValues ? trendValues.map((v, i) => ({ x: padding + i * stepX, y: height - padding - ((v - minY) / range) * (height - padding * 2) })) : null;
  const trendPathD = trendCoords ? trendCoords.map((c, i) => `${i === 0 ? "M" : "L"} ${c.x} ${c.y}`).join(" ") : null;

  const gridCount = 4;
  const gridLines = Array.from({ length: gridCount + 1 }, (_, i) => {
    const val = minY + (range * i) / gridCount;
    const y = height - padding - ((val - minY) / range) * (height - padding * 2);
    return { y, val: round(val) };
  });

  return (
    <div>
      <svg viewBox={`0 0 ${width} ${height}`} className="w-full" style={{ maxHeight: height + 20 }}>
        {gridLines.map((g, i) => <g key={i}><line x1={padding} y1={g.y} x2={width - padding} y2={g.y} stroke={INK_SOFT} strokeWidth="0.5" strokeOpacity="0.3" strokeDasharray="3,3" /><text x={padding - 6} y={g.y + 3} fontSize="9" fill={INK_SOFT} textAnchor="end">{g.val}</text></g>)}
        <line x1={padding} y1={height - padding} x2={width - padding} y2={height - padding} stroke={INK_SOFT} strokeWidth="1" />
        {trendPathD && <path d={trendPathD} fill="none" stroke={INK_SOFT} strokeWidth="2" strokeDasharray="6,4" opacity="0.8" />}
        <path d={pathD} fill="none" stroke={ACCENT} strokeWidth="2.5" />
        {coords.map((c, i) => <circle key={i} cx={c.x} cy={c.y} r="4" fill={ACCENT} />)}
        {coords.map((c, i) => <text key={"lbl" + i} x={c.x} y={c.y - 10} fontSize="10" fill={INK} textAnchor="middle" fontWeight="700">{round(c.value)}</text>)}
        {coords.map((c, i) => <text key={"xlbl" + i} x={c.x} y={height - 10} fontSize="9" fill={INK_SOFT} textAnchor="middle">{c.label}</text>)}
      </svg>
      {showTrend && points.length >= 3 && (
        <div className="flex items-center gap-3 mt-1.5">
          <span className="flex items-center gap-1.5 text-xs" style={{ color: INK_SOFT }}><span style={{ width: 14, height: 0, borderTop: `2px dashed ${INK_SOFT}`, display: "inline-block" }} /> 3-session trend</span>
          <span className="flex items-center gap-1.5 text-xs" style={{ color: INK_SOFT }}><span style={{ width: 14, height: 2.5, background: ACCENT, display: "inline-block" }} /> Actual</span>
        </div>
      )}
    </div>
  );
}

function TrophiesTab({ userStats, resolvedAchievements, gender, setGender, unit, setUnit }) {
  const [filterCategory, setFilterCategory] = useState("All");

  if (!gender) {
    return (
      <PaperCard className="p-5">
        <p className="text-sm font-medium mb-2 nb-header" style={{ color: INK }}>One quick setup step</p>
        <p className="text-xs mb-3" style={{ color: INK_SOFT }}>Strength rankings are gender-specific (this only affects ranking math — nothing else in the app). Pick one to continue; you can change it anytime from this tab.</p>
        <div className="flex gap-2 mb-3">
          <button onClick={() => setGender("M")} className="text-sm px-4 py-2 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}>Male tables</button>
          <button onClick={() => setGender("F")} className="text-sm px-4 py-2 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, color: INK }}>Female tables</button>
        </div>
        <div className="flex items-center gap-2">
          <span className="text-xs" style={{ color: INK_SOFT }}>Units:</span>

          <button onClick={() => setUnit("kg")} className="text-xs px-2 py-1" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, background: unit === "kg" ? INK : "transparent", color: unit === "kg" ? PAPER_BG : INK }}>kg</button>
        </div>
      </PaperCard>
    );
  }

  const categories = ["All", ...Array.from(new Set(resolvedAchievements.map((a) => a.category)))];
  const filtered = filterCategory === "All" ? resolvedAchievements : resolvedAchievements.filter((a) => a.category === filterCategory);
  const sortedFiltered = [...filtered].sort((a, b) => {
    if (a.result.earned && !b.result.earned) return -1;
    if (!a.result.earned && b.result.earned) return 1;
    return (b.result.progress ?? 0) - (a.result.progress ?? 0);
  });
  const earnedCount = resolvedAchievements.filter((a) => a.result.earned).length;

  return (
    <div>
      <PaperCard className="p-3 mb-4">
        <div className="flex items-center justify-between flex-wrap gap-2">
          <div className="flex items-center gap-2"><Trophy size={18} style={{ color: GOLD }} /><p className="text-sm nb-script" style={{ color: INK }}>{earnedCount} / {resolvedAchievements.length} achievements earned</p></div>
          <div className="flex items-center gap-3 text-xs" style={{ color: INK_SOFT }}>
            <span>Gender table: <button onClick={() => setGender(gender === "M" ? "F" : "M")} className="underline" style={{ color: INK }}>{gender === "M" ? "Male" : "Female"}</button></span>
            <span>Units: <button onClick={() => setUnit(unit === "lb" ? "kg" : "lb")} className="underline" style={{ color: INK }}>{unit}</button></span>
          </div>
        </div>
      </PaperCard>

      <RankingPanel userStats={userStats} gender={gender} unit={unit} />

      {userStats.dots != null && (
        <PaperCard className="p-3 mb-4 flex items-center justify-between flex-wrap gap-2">
          <div className="flex items-center gap-2"><Medal size={18} style={{ color: GOLD }} /><div><p className="text-sm font-medium nb-script" style={{ color: INK }}>DOTS Score: {userStats.dots}</p><p className="text-xs" style={{ color: INK_SOFT }}>{userStats.dotsTier ? `Tier: ${userStats.dotsTier}` : "Below Novice tier"}</p></div></div>
        </PaperCard>
      )}

      <div className="flex gap-2 mb-3 flex-wrap">
        {categories.map((c) => <button key={c} onClick={() => setFilterCategory(c)} className="text-xs px-2.5 py-1.5 nb-script" style={{ border: `1.5px solid ${INK}`, borderRadius: 3, background: filterCategory === c ? INK : "transparent", color: filterCategory === c ? PAPER_BG : INK }}>{c}</button>)}
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">{sortedFiltered.map((a) => <AchievementCard key={a.id} achievement={a} />)}</div>
    </div>
  );
}

function RankingPanel({ userStats, gender, unit }) {
  return (
    <div className="mb-4">
      <p className="text-sm font-medium mb-2 nb-header" style={{ color: INK }}>Strength Ranking</p>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
        {TM_LIFTS.map((lift) => {
          const ls = userStats.mainLiftStats[lift.key];
          if (!ls || !ls.ratio) return <PaperCard key={lift.key} className="p-3"><p className="text-sm font-medium nb-script">{lift.label}</p><p className="text-xs" style={{ color: INK_SOFT }}>Not enough data — log this lift and a bodyweight entry to see your rank.</p></PaperCard>;
          const tierInfo = tierForRatio(lift.key, ls.ratio, gender);
          const score = normalizedScore(tierInfo);
          return (
            <PaperCard key={lift.key} className="p-3">
              <div className="flex items-center justify-between mb-1"><p className="text-sm font-medium nb-script">{lift.label}</p><span className="text-[10px] px-1.5 py-0.5 rounded nb-script" style={{ background: "#e8c45a55", color: "#7a5a10" }}>{tierInfo.tierName}</span></div>
              <p className="text-xs mb-1.5" style={{ color: INK_SOFT }}>{ls.e1rm} {unit} {ls.isRealOneRM ? "(real 1RM)" : "e1RM"} · {round(ls.ratio, 2)}x bodyweight</p>
              <div className="h-1.5 rounded-full overflow-hidden" style={{ background: "rgba(59,47,30,0.15)" }}><div className="h-full" style={{ width: `${score}%`, background: ACCENT }} /></div>
              {tierInfo.nextTierName && <p className="text-[10px] mt-1" style={{ color: INK_SOFT }}>{Math.round(tierInfo.progressToNext * 100)}% to {tierInfo.nextTierName}</p>}
            </PaperCard>
          );
        })}
      </div>
    </div>
  );
}

function AchievementCard({ achievement }) {
  const Icon = ICONS[achievement.icon] || Star;
  const { earned, progress, label } = achievement.result;
  const tierColor = TIER_COLOR[achievement.tier] || INK_SOFT;
  return (
    <PaperCard className="p-3" style={{ opacity: earned ? 1 : 0.55 }}>
      <div className="flex items-start gap-2.5">
        <div className="flex items-center justify-center rounded-full shrink-0" style={{ width: 36, height: 36, background: earned ? `${tierColor}22` : "rgba(59,47,30,0.08)", border: `1.5px solid ${earned ? tierColor : "rgba(59,47,30,0.25)"}` }}>
          <Icon size={17} style={{ color: earned ? tierColor : INK_SOFT }} />
        </div>
        <div className="flex-1 min-w-0">
          <p className="text-sm font-medium nb-script" style={{ color: INK }}>{achievement.name}</p>
          <p className="text-[11px]" style={{ color: INK_SOFT }}>{achievement.description}</p>
          {progress != null && progress < 1 && (
            <>
              <div className="h-1 rounded-full overflow-hidden mt-1.5" style={{ background: "rgba(59,47,30,0.15)" }}><div className="h-full" style={{ width: `${Math.round(progress * 100)}%`, background: tierColor }} /></div>
              <p className="text-[10px] mt-0.5" style={{ color: INK_SOFT }}>{label}</p>
            </>
          )}
          {earned && <p className="text-[10px] mt-1" style={{ color: "#3f6b3f" }}>✓ Earned</p>}
        </div>
      </div>
    </PaperCard>
  );
}

function NotesTab({ generalNotes, setGeneralNotes, blocks, updateBlock }) {
  return (
    <div className="space-y-6">
      <div>
        <p className="text-sm font-medium mb-2 nb-header" style={{ color: INK }}>General notes</p>
        <p className="text-xs mb-2" style={{ color: INK_SOFT }}>Anything about how you use the app, things to remember, ideas to try later.</p>
        <textarea value={generalNotes} onChange={(e) => setGeneralNotes(e.target.value)} rows={8} placeholder="e.g. My shoulder feels best when I warm up with face pulls first. Try a longer deload next time..." className="w-full px-3 py-2 text-sm" style={inputStyle()} />
      </div>
      {blocks.length > 0 && (
        <div>
          <p className="text-sm font-medium mb-2 nb-header" style={{ color: INK }}>Per-program notes</p>
          <div className="space-y-3">
            {blocks.map((b) => (
              <PaperCard key={b.id} className="p-3">
                <p className="text-sm font-medium nb-script mb-1.5" style={{ fontSize: "1.05rem" }}>{b.name}</p>
                <textarea value={b.notes || ""} onChange={(e) => updateBlock(b.id, { notes: e.target.value })} rows={3} placeholder="Tweaks, cues, things to remember for this program..." className="w-full px-2 py-1.5 text-sm" style={inputStyle()} />
              </PaperCard>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
